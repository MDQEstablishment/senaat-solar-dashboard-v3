      <Card padding="p-0">
        <div className="grid grid-cols-1 lg:grid-cols-3 gap-0">
          <div className="lg:col-span-2 p-5 border-r border-soft">
            <Tabs tabs={TABS} active={tab} onChange={setTab} />
            <div className="pt-4 text-sm">
              {tab === 'Overview' && (
                <div className="space-y-3">
                  <p className="text-ink-700 ink-on-dark text-sm">
                    {project.name} covers solar PV installation across {project.sites > 1 ? `${project.sites} school sites` : 'a single facility'} in the {project.region} region.
                    Currently in <span className="font-semibold text-gold">{PROJECT_STAGES[project.currentStage].name}</span>.
                  </p>
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                    {[
                      ['Start', project.start],
                      ['Target', project.target],
                      ['Region', project.region],
                      ['City', project.city],
                    ].map(([l,v]) => (
                      <div key={l}>
                        <div className="text-[10px] uppercase text-ink-500 tracking-wider ink-muted-on-dark">{l}</div>
                        <div className="text-sm font-semibold ink-on-dark tnum">{v}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {tab === 'Schools' && (
                <div>
                  <p className="text-xs text-ink-500 mb-3">{project.sites} schools in this program. Open the full list to see stage-by-stage progress for each school.</p>
                  <Button variant="accent" icon="school" onClick={() => onOpenSchools && onOpenSchools(project.id)}>Open schools list</Button>
                </div>
              )}
              {tab === 'Sites' && (
                <div className="text-xs text-ink-500 italic">Single-site project — see lifecycle above.</div>
              )}
              {tab === 'Tasks' && (
                <div>
                  <div className="flex items-center justify-between mb-2">
                    <div className="text-xs text-ink-500">{projTasks.length} tasks linked to this project</div>
                    <Button size="sm" variant="accent" icon="plus" onClick={() => onAddTask && onAddTask({ projectId: project.id })}>Add task</Button>
                  </div>
                  <div className="space-y-1.5">
                    {projTasks.slice(0, 8).map(t => {
                      const a = getPerson(t.assigneeId);
                      const overdue = isOverdue(t.due) && t.status !== 'Done';
                      return (
                        <div key={t.id} onClick={() => onOpenTask && onOpenTask(t)}
                          className="flex items-center gap-2 p-2 rounded-md surface-2 border border-soft hover:border-accent cursor-pointer text-xs">
                          <Pill tone={t.priority === 'High' ? 'danger' : t.priority === 'Medium' ? 'warn' : 'soft'}>{t.priority}</Pill>
                          <span className="flex-1 font-medium">{t.title}</span>
                          <Avatar initials={a?.initials} size={18} />
                          <span className={cls('text-[11px] w-20 text-right', overdue ? 'text-red-600 font-semibold' : 'text-ink-500')}>{fmtDate(t.due)}</span>
                        </div>
                      );
                    })}
                    {projTasks.length === 0 && <div className="text-xs text-ink-500 italic">No tasks yet — click Add task above.</div>}
                  </div>
                </div>
              )}
              {(tab === 'Materials' || tab === 'Financials' || tab === 'Contractors') && (
                <div className="text-xs text-ink-500 py-6 text-center">
                  Open the dedicated <span className="font-semibold">{tab}</span> page from the sidebar for full detail.
                </div>
              )}
            </div>
          </div>
          <div className="p-5 surface-2">
            <div className="text-[11px] uppercase tracking-wider text-ink-500 ink-muted-on-dark mb-2">Site Map</div>
            <div className="placeholder-grid h-48 rounded-md border border-soft flex items-center justify-center text-ink-500 text-xs">
              <Icon name="map" size={24} />
            </div>
            <div className="mt-4 text-[11px] uppercase tracking-wider text-ink-500 ink-muted-on-dark mb-2">Project Manager</div>
            <div className="flex items-center gap-2">
              <Avatar initials={pm.initials} size={32} />
              <div>
                <div className="text-sm font-semibold ink-on-dark">{pm.name}</div>
                <div className="text-[11px] text-ink-500 ink-muted-on-dark">{pm.role} · {pm.region}</div>
              </div>
            </div>
          </div>
        </div>
      </Card>

      <StageDetailPanel
        stage={openStage != null ? PROJECT_STAGES[openStage] : null}
        stageIdx={openStage}
        project={project}
        onClose={() => setOpenStage(null)}
      />
    </div>
  );
}

Object.assign(window, { PageProject });

</script>
<script type="text/babel">
// Schools list — 200 schools per project, 12 stage columns + remarks + full CRUD

function AddSchoolModal({ open, onClose, onSave, project }) {
  const [code, setCode]     = React.useState('');
  const [name, setName]     = React.useState('');
  const [city, setCity]     = React.useState('');
  const [type, setType]     = React.useState('Primary');
  const [gender, setGender] = React.useState('Boys');
  const [kw, setKw]         = React.useState(100);
  const cities = CITIES[project.region] || ['Riyadh'];

  React.useEffect(() => {
    if (open) { setCode(''); setName(''); setCity(cities[0] || ''); setType('Primary'); setGender('Boys'); setKw(100); }
  }, [open]);

  return (
    <Modal open={open} onClose={onClose} title="Add School"
      footer={<>
        <Button variant="ghost" onClick={onClose}>Cancel</Button>
        <Button variant="accent" icon="check" onClick={() => {
          if (!code.trim() || !name.trim()) return;
          onSave({ code, name, city, region: project.region, projectId: project.id, type, gender, kw: +kw, address: `${city}, ${project.region}` });
          onClose();
        }}>Add school</Button>
      </>}>
      <div className="space-y-3">
        <div className="grid grid-cols-2 gap-3">
          <div>
            <label className="text-[11px] font-medium text-ink-700 mb-1 block">School code</label>
            <TextField value={code} onChange={setCode} placeholder={`${project.id.toUpperCase()}-201`} />
          </div>
          <div>
            <label className="text-[11px] font-medium text-ink-700 mb-1 block">City</label>
            <Select value={city} onChange={setCity} options={cities} className="w-full" />
          </div>
        </div>
        <div>
          <label className="text-[11px] font-medium text-ink-700 mb-1 block">School name</label>
          <TextField value={name} onChange={setName} placeholder="e.g. Al-Faisal Primary School for Boys" />
        </div>
        <div className="grid grid-cols-3 gap-3">
          <div>
            <label className="text-[11px] font-medium text-ink-700 mb-1 block">Type</label>
            <Select value={type} onChange={setType} options={['Primary','Intermediate','Secondary']} className="w-full" />
          </div>
          <div>
            <label className="text-[11px] font-medium text-ink-700 mb-1 block">Gender</label>
            <Select value={gender} onChange={setGender} options={['Boys','Girls']} className="w-full" />
          </div>
          <div>
            <label className="text-[11px] font-medium text-ink-700 mb-1 block">System size (kWp)</label>
            <TextField value={kw} onChange={setKw} type="number" />
          </div>
        </div>
      </div>
    </Modal>
  );
}

function ImportSchoolsModal({ open, onClose }) {
  const [done, setDone] = React.useState(false);
  const [importing, setImporting] = React.useState(false);

  const downloadTemplate = () => {
    const headers = ['Code','Name','City','Type','Gender','kW'];
    const sample  = [`${new Date().getFullYear()}-201`, 'Al-Faisal Primary School', 'Arar', 'Primary', 'Boys', '100'];
    const csv = [headers.join(','), sample.join(',')].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'schools-import-template.csv';
    a.click();
  };

  const handleImport = () => {
    setImporting(true);
    setTimeout(() => { setImporting(false); setDone(true); }, 1200);
  };

  React.useEffect(() => { if (open) setDone(false); }, [open]);

  return (
    <Modal open={open} onClose={onClose} title="Import Schools"
      footer={<>
        <Button variant="ghost" onClick={onClose}>Close</Button>
        {!done && <Button variant="accent" icon="upload" onClick={handleImport} disabled={importing}>{importing ? 'Importing…' : 'Import'}</Button>}
      </>}>
      <div className="space-y-4">
        <div className="bg-sky-50 border border-sky-200 rounded-md p-3 text-xs text-sky-800">
          <div className="font-semibold mb-1">Import instructions</div>
          <ol className="list-decimal list-inside space-y-1">
            <li>Download the Excel template below</li>
            <li>Fill in school data (one row per school)</li>
            <li>Upload the completed file and click Import</li>
          </ol>
        </div>
        <Button variant="outline" icon="file-spreadsheet" onClick={downloadTemplate}>Download Excel template (.csv)</Button>
        {!done ? (
          <div className="border-2 border-dashed border-soft rounded-md p-8 text-center text-xs text-ink-500">
            <Icon name="upload" size={20} />
            <div className="mt-2 font-medium">Drop your CSV/Excel file here or click to browse</div>
            <div className="mt-1 text-ink-400">Columns: Code, Name, City, Type, Gender, kW</div>
          </div>
        ) : (
          <div className="bg-emerald-50 border border-emerald-200 rounded-md p-4 text-sm text-emerald-800 text-center">
            <Icon name="check-circle" size={20} />
            <div className="mt-1 font-semibold">Import complete</div>
            <div className="text-xs text-emerald-700">Schools have been added to this project.</div>
          </div>
        )}
      </div>
    </Modal>
  );
}

function PageSchoolsList({ project, onBack, onOpenSchool, onAddTask }) {
  const { schools, addSchool, deleteSchool } = useStore();
  const projSchools = React.useMemo(() => schools.filter(s => s.projectId === project.id), [schools, project.id]);

  const [q, setQ]               = React.useState('');
  const [stageFilter, setStageFilter]   = React.useState('all');
  const [remarkFilter, setRemarkFilter] = React.useState('all');
  const [cityFilter, setCityFilter]     = React.useState('all');
  const [addOpen, setAddOpen]   = React.useState(false);
  const [importOpen, setImportOpen] = React.useState(false);
  const [confirmDelete, setConfirmDelete] = React.useState(null);

  const cities = React.useMemo(() => Array.from(new Set(projSchools.map(s => s.city))), [projSchools]);

  const filtered = React.useMemo(() => projSchools.filter(s => {
    if (q && !(s.name + s.code + s.city).toLowerCase().includes(q.toLowerCase())) return false;
    if (cityFilter !== 'all' && s.city !== cityFilter) return false;
    if (remarkFilter !== 'all' && s.remark !== remarkFilter) return false;
    if (stageFilter !== 'all') {
      const idx = Number(stageFilter);
      const reached = s.stages.filter(st => st.done).length;
      if (reached <= idx) return false;
    }
    return true;
  }), [projSchools, q, stageFilter, remarkFilter, cityFilter]);

  const exportToExcel = () => {
    const headers = ['Code', 'Name', 'City', ...SCHOOL_STAGES, 'Remark', 'Last Updated By', 'Last Updated When'];
    const rows = filtered.map(s => [
      s.code, '"' + s.name + '"', s.city,
      ...s.stages.map(st => st.done ? new Date(st.date).toISOString().slice(0, 10) : ''),
      s.remark,
      getPerson(s.lastUpdate?.by)?.name || '',
      s.lastUpdate?.when ? new Date(s.lastUpdate.when).toISOString().slice(0, 10) : '',
    ]);
    const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${project.id}-schools.csv`;
    a.click();
  };

  // Pagination
  const [page, setPage] = React.useState(0);
  const pageSize = 50;
  const totalPages = Math.ceil(filtered.length / pageSize);
  const pageRows = filtered.slice(page * pageSize, (page + 1) * pageSize);
  React.useEffect(() => { setPage(0); }, [q, stageFilter, remarkFilter, cityFilter]);

  const energized = projSchools.filter(s => s.stages[8].done).length;
  const handed    = projSchools.filter(s => s.stages[11].done).length;
  const blocked   = projSchools.filter(s => s.remark !== 'Active').length;

  return (
    <div className="p-6 space-y-4">
      <div className="flex items-center gap-3">
        <Button variant="ghost" icon="arrow-left" onClick={onBack}>Back</Button>
        <div>
          <h1 className="text-lg font-semibold">{project.name}</h1>
          <div className="text-xs text-ink-500">All schools · {projSchools.length} records</div>
        </div>
        <div className="flex-1" />
        <Button variant="outline" icon="plus" onClick={() => onAddTask({ projectId: project.id })}>Add task</Button>
        <Button variant="outline" icon="upload" onClick={() => setImportOpen(true)}>Import Schools</Button>
        <Button variant="outline" icon="plus" onClick={() => setAddOpen(true)}>Add School</Button>
        <Button variant="accent" icon="file-spreadsheet" onClick={exportToExcel}>Export to Excel</Button>
      </div>

      <div className="grid grid-cols-4 gap-3">
        {[
          { label: 'Total schools',       value: projSchools.length, tone: 'navy' },
          { label: 'Energized',           value: energized,          tone: 'ok' },
          { label: 'Handed over',         value: handed,             tone: 'gold' },
          { label: 'Blocked / excluded',  value: blocked,            tone: 'warn' },
        ].map(k => (
          <Card key={k.label} padding="p-4">
            <div className="text-[11px] uppercase tracking-wider text-ink-500">{k.label}</div>
            <div className="text-2xl font-bold mt-1 num">{k.value}</div>
          </Card>
        ))}
      </div>

      <Card padding="p-3">
        <div className="flex flex-wrap gap-2 items-center">
          <div className="relative">
            <span className="absolute left-2.5 top-1/2 -translate-y-1/2 text-ink-500"><Icon name="search" size={14} /></span>
            <input value={q} onChange={e => setQ(e.target.value)} placeholder="Search code, name, city…"
              className="pl-8 pr-3 py-1.5 text-sm rounded-md border border-ink-200 bg-white w-64 focus:outline-none focus:ring-2 ring-accent" />
          </div>
          <Select value={stageFilter} onChange={setStageFilter}
            options={[{ value: 'all', label: 'All stages' }, ...SCHOOL_STAGES.map((s, i) => ({ value: String(i), label: `Past stage ${i + 1}: ${s}` }))]} />
          <Select value={remarkFilter} onChange={setRemarkFilter}
            options={[{ value: 'all', label: 'All remarks' }, ...REMARKS.map(r => ({ value: r, label: r }))]} />
          <Select value={cityFilter} onChange={setCityFilter}
            options={[{ value: 'all', label: 'All cities' }, ...cities.map(c => ({ value: c, label: c }))]} />
          <div className="ml-auto text-xs text-ink-500">{filtered.length} of {projSchools.length} schools</div>
        </div>
      </Card>

      <Card padding="p-0">
        <div className="overflow-auto scrollbar-thin">
          <table className="w-full text-xs">
            <thead className="surface-2 border-b border-soft sticky top-0">
              <tr>
                <th className="text-left px-3 py-2 font-semibold whitespace-nowrap sticky left-0 surface-2 z-10">Code</th>
                <th className="text-left px-3 py-2 font-semibold whitespace-nowrap min-w-[280px]">School name</th>
                <th className="text-left px-3 py-2 font-semibold whitespace-nowrap">City</th>
                {SCHOOL_STAGES.map((s, i) => (
                  <th key={i} className="text-center px-2 py-2 font-semibold whitespace-nowrap" title={s}>
                    <div className="flex flex-col items-center">
                      <span className="text-[10px] text-ink-500">{i + 1}</span>
                      <span className="text-[10px]">{s.split(' ').slice(0, 2).join(' ')}</span>
                    </div>
                  </th>
                ))}
                <th className="text-left px-3 py-2 font-semibold whitespace-nowrap">Remark</th>
                <th className="text-left px-3 py-2 font-semibold whitespace-nowrap">Last update</th>
                <th className="text-right px-3 py-2 font-semibold">Actions</th>
              </tr>
            </thead>
            <tbody>
              {pageRows.map(s => (
                <tr key={s.id} className="border-b border-soft hover-row cursor-pointer">
                  <td className="px-3 py-2 font-mono text-[11px] sticky left-0 bg-white surface" onClick={() => onOpenSchool(s.id)}>{s.code}</td>
                  <td className="px-3 py-2" onClick={() => onOpenSchool(s.id)}><span className="font-medium">{s.name}</span></td>
                  <td className="px-3 py-2 text-ink-700" onClick={() => onOpenSchool(s.id)}>{s.city}</td>
                  {s.stages.map((st, i) => (
                    <td key={i} className="text-center px-2 py-2" onClick={() => onOpenSchool(s.id)}>
                      {st.done ? (
                        <div className="flex flex-col items-center">
                          <span className="text-emerald-600"><Icon name="check" size={14} strokeWidth={3} /></span>
                          <span className="text-[9px] text-ink-500">{new Date(st.date).toLocaleDateString('en-GB', { day: '2-digit', month: 'short' })}</span>
                        </div>
                      ) : <span className="text-ink-200">—</span>}
                    </td>
                  ))}
                  <td className="px-3 py-2" onClick={() => onOpenSchool(s.id)}>
                    <Pill tone={s.remark === 'Active' ? 'ok' : s.remark === 'Excluded' || s.remark === 'Closed' ? 'soft' : 'warn'}>{s.remark}</Pill>
                  </td>
                  <td className="px-3 py-2 text-ink-500" onClick={() => onOpenSchool(s.id)}>
                    {s.lastUpdate?.by ? `${getPerson(s.lastUpdate.by)?.initials} · ${new Date(s.lastUpdate.when).toLocaleDateString('en-GB', { day: '2-digit', month: 'short' })}` : '—'}
                  </td>
                  <td className="px-3 py-2 text-right">
                    <button onClick={e => { e.stopPropagation(); setConfirmDelete(s); }}
                      className="p-1 rounded hover:bg-ink-100 text-ink-500 hover:text-red-600" title="Delete school">
                      <Icon name="trash-2" size={13} />
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="flex items-center justify-between p-3 border-t border-soft">
          <div className="text-xs text-ink-500">Page {page + 1} of {Math.max(1, totalPages)}</div>
          <div className="flex gap-1">
            <Button variant="outline" size="sm" disabled={page === 0} onClick={() => setPage(p => p - 1)}>Prev</Button>
            <Button variant="outline" size="sm" disabled={page >= totalPages - 1} onClick={() => setPage(p => p + 1)}>Next</Button>
          </div>
        </div>
      </Card>

      <AddSchoolModal open={addOpen} onClose={() => setAddOpen(false)} onSave={addSchool} project={project} />
      <ImportSchoolsModal open={importOpen} onClose={() => setImportOpen(false)} />

      <Modal open={!!confirmDelete} onClose={() => setConfirmDelete(null)} title="Delete school"
        footer={<>
          <Button variant="ghost" onClick={() => setConfirmDelete(null)}>Cancel</Button>
          <Button variant="danger" icon="trash-2" onClick={() => { deleteSchool(confirmDelete.id); setConfirmDelete(null); }}>
            Delete (moves to Recycle Bin)
          </Button>
        </>}>
        <p className="text-sm">Delete <strong>{confirmDelete?.code} · {confirmDelete?.name}</strong>?
          It will move to the Recycle Bin and can be restored from Settings → Recycle Bin.</p>
      </Modal>
    </div>
  );
}

Object.assign(window, { PageSchoolsList });

</script>
<script type="text/babel">
// School detail — info, flexible stage timeline (status picker + history), snags, chat panel

function PageSchoolDetail({ schoolId, onBack, onAddTask, currentUser, onEscalate }) {
  const {
    schools, chats, sendChatMessage, updateSchoolStage, updateSchoolRemark, addSchoolPhoto,
    stageStatuses, setSchoolStageStatus, stageHistory,
  } = useStore();

  const school = schools.find(s => s.id === schoolId);
  if (!school) return <div className="p-6">School not found.</div>;

  const project = getProject(school.projectId);
  const contractor = CONTRACTORS.find(c => c.id === school.contractor);
  const messages = chats[school.id] || [];
  const reached = school.stages.filter(s => s.done).length;
  const stageProgress = Math.round((reached / SCHOOL_STAGES.length) * 100);

  const uploadPhoto = (i) => {
    const label = `Photo ${(school.photos[i]?.length || 0) + 1} for ${SCHOOL_STAGES[i]}`;
    addSchoolPhoto(school.id, i, label);
  };

  const changeStatus = (stageIdx, statusId, reason) => {
    if (setSchoolStageStatus) {
      setSchoolStageStatus(school.id, stageIdx, statusId, currentUser.id, reason);
    } else {
      // Fallback for basic "done" toggle
      const status = (stageStatuses || []).find(s => s.id === statusId);
      updateSchoolStage(school.id, stageIdx, {
        done: status?.terminal || false,
        date: status?.terminal ? new Date().toISOString() : null,
        by: currentUser.id,
      });
    }
  };

  return (
    <div className="p-6 grid grid-cols-12 gap-4 h-[calc(100vh-56px)]">
      {/* Left + center */}
      <div className="col-span-8 overflow-auto scrollbar-thin pr-2 space-y-4">
        <div className="flex items-center gap-3">
          <Button variant="ghost" icon="arrow-left" onClick={onBack}>Back</Button>
          <div className="flex-1">
            <div className="text-xs text-ink-500">{project?.name}</div>
            <h1 className="text-lg font-semibold">{school.code} · {school.name}</h1>
          </div>
          {onEscalate && <Button variant="outline" icon="alert-circle" onClick={() => onEscalate(school)}>Escalate to VP</Button>}
          <Button variant="outline" icon="plus" onClick={() => onAddTask({ projectId: school.projectId, schoolId: school.id })}>Add task</Button>
        </div>

        <Card padding="p-4">
          <div className="grid grid-cols-4 gap-4 text-xs">
            <Info label="Address"      value={school.address} />
            <Info label="City"         value={school.city} />
            <Info label="Region"       value={school.region} />
            <Info label="System size"  value={`${school.kw} kWp`} />
            <Info label="Type"         value={`${school.type} · ${school.gender}`} />
            <Info label="Contractor"   value={contractor?.name || '—'} />
            <Info label="Project Manager" value={getPerson(project?.pmId)?.name} />
            <div>
              <div className="text-[10px] uppercase tracking-wider text-ink-500">Remark</div>
              <Select value={school.remark} onChange={(v) => updateSchoolRemark(school.id, v)} options={REMARKS} className="mt-1 !text-xs !py-1" />
            </div>
          </div>
          <div className="mt-3">
            <div className="flex items-center justify-between mb-1">
              <div className="text-[11px] font-medium text-ink-700">Execution progress</div>
              <div className="text-[11px] num font-semibold">{stageProgress}% · stage {reached}/12</div>
            </div>
            <ProgressBar value={stageProgress} />
          </div>
        </Card>

        <Card padding="p-4">
          <SectionTitle icon="git-branch" title="Stage timeline"
            subtitle="Set status per stage — transitions are free in any direction" />
          <div className="space-y-2">
            {SCHOOL_STAGES.map((stageName, i) => (
              <StageRow key={i} index={i} stageName={stageName} school={school}
                stageStatuses={stageStatuses || []}
                stageHistory={stageHistory}
                onChangeStatus={(statusId, reason) => changeStatus(i, statusId, reason)}
                onUploadPhoto={() => uploadPhoto(i)}
                onAddTask={() => onAddTask({ projectId: school.projectId, schoolId: school.id, stageIndex: i })} />
            ))}
          </div>
        </Card>

        <Card padding="p-4">
          <SectionTitle icon="alert-circle" title="Snag / issue log" subtitle={`${school.issues.length} item(s)`} />
          {school.issues.length === 0 ? (
            <div className="text-xs text-ink-500 italic">No snags logged for this school.</div>
          ) : (
            <div className="space-y-2">
              {school.issues.map(iss => (
                <div key={iss.id} className="flex items-start gap-3 p-3 rounded-md border border-soft surface-2 text-xs">
                  <Pill tone={iss.severity === 'High' ? 'danger' : iss.severity === 'Medium' ? 'warn' : 'soft'}>{iss.severity}</Pill>
                  <div className="flex-1">
                    <div>{iss.text}</div>
                    <div className="text-[10px] text-ink-500 mt-0.5">Opened {fmtDate(iss.opened)}</div>
                  </div>
                  <Pill tone={iss.status === 'Open' ? 'warn' : 'ok'}>{iss.status}</Pill>
                </div>
              ))}
            </div>
          )}
        </Card>
      </div>

      {/* Right: Chat */}
      <div className="col-span-4 surface border border-soft rounded-xl flex flex-col overflow-hidden">
        <div className="px-4 py-3 border-b border-soft surface flex items-center justify-between">
          <div>
            <h3 className="text-sm font-semibold flex items-center gap-2"><Icon name="mail" size={14} /> School chat</h3>
            <p className="text-[10px] text-ink-500">PM, Engineer, Site, QA/QC · type @ to mention</p>
          </div>
          <Pill tone="soft">{messages.length}</Pill>
        </div>
        <div className="flex-1 min-h-0">
          <ChatPanel
            schoolId={school.id}
            messages={messages}
            currentUserId={currentUser.id}
            onSend={(msg) => sendChatMessage(school.id, msg)} />
        </div>
      </div>
    </div>
  );
}

// ── Stage row with flexible status picker ─────────────────────────────────────
function StageRow({ index, stageName, school, stageStatuses, stageHistory, onChangeStatus, onUploadPhoto, onAddTask }) {
  const st = school.stages[index];
  const photos = school.photos[index] || [];
  const histKey = `${school.id}-${index}`;
  const history = (stageHistory || {})[histKey] || [];
  const [showReason, setShowReason] = React.useState(false);
  const [pendingStatus, setPendingStatus] = React.useState(null);
  const [reason, setReason] = React.useState('');
  const [showHistory, setShowHistory] = React.useState(false);

  const currentStatusId = st.statusId || (st.done ? 'done' : 'not-started');
  const currentStatus   = stageStatuses.find(s => s.id === currentStatusId) || { label: st.done ? 'Done' : 'Not Started', color: st.done ? '#16A34A' : '#94A3B8' };
  const responsiblePerson = st.by ? getPerson(st.by) : null;

  const isDone = st.done;
  const rowBg = isDone ? 'border-emerald-200 bg-emerald-50/30' : 'border-soft surface-2';

  const handleStatusChange = (statusId) => {
    const status = stageStatuses.find(s => s.id === statusId);
    if (status && !status.builtin && !status.terminal) {
      // Custom or non-terminal: prompt for reason
      setPendingStatus(statusId);
      setShowReason(true);
    } else {
      onChangeStatus(statusId, '');
    }
  };

  const confirmWithReason = () => {
    if (pendingStatus) { onChangeStatus(pendingStatus, reason); }
    setShowReason(false); setReason(''); setPendingStatus(null);
  };

  return (
    <div className={cls('rounded-md border', rowBg)}>
      <div className="flex items-start gap-3 p-3">
        <div className={cls('w-7 h-7 rounded-full flex items-center justify-center text-[11px] font-bold shrink-0',
          isDone ? 'bg-emerald-500 text-white' : 'bg-ink-200 text-ink-700')}>
          {isDone ? <Icon name="check" size={14} strokeWidth={3} /> : index + 1}
        </div>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="font-medium text-sm">{stageName}</span>
            {/* Status badge */}
            <span className="inline-flex items-center gap-1 px-1.5 py-0.5 rounded-full text-[10px] font-medium text-white"
              style={{ background: currentStatus.color }}>
              {currentStatus.label}
            </span>
            {isDone && <span className="text-[11px] text-ink-500">{fmtDate(st.date)}</span>}
            {responsiblePerson && (
              <span className="text-[11px] text-ink-500 flex items-center gap-1">
                · <Avatar initials={responsiblePerson.initials} size={16} /> {responsiblePerson.name}
              </span>
            )}
            {history.length > 0 && (
              <button onClick={() => setShowHistory(h => !h)} className="text-[10px] text-ink-500 hover:text-ink-800 underline">
                {history.length} change{history.length > 1 ? 's' : ''}
              </button>
            )}
          </div>
          {photos.length > 0 && (
            <div className="mt-2 flex gap-1 flex-wrap">
              {photos.map(ph => (
                <div key={ph.id} className="w-14 h-14 rounded bg-ink-100 placeholder-grid border border-soft flex items-center justify-center text-[9px] text-ink-500">
                  <Icon name="sun" size={14} />
                </div>
              ))}
            </div>
          )}
          {showHistory && history.length > 0 && (
            <div className="mt-2 space-y-1 border-t border-soft pt-2">
              {history.map((h, j) => {
                const u = getPerson(h.who);
                const toSt = stageStatuses.find(s => s.id === h.to);
                return (
                  <div key={j} className="text-[10px] text-ink-500 flex items-center gap-1">
                    <Avatar initials={u?.initials || '?'} size={14} />
                    <span>{u?.name}</span> →
                    <span className="font-medium" style={{ color: toSt?.color || '#666' }}>{toSt?.label || h.to}</span>
                    {h.reason && <span className="text-ink-400">"{h.reason}"</span>}
                    <span className="ml-auto">{new Date(h.when).toLocaleTimeString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' })}</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
        <div className="flex flex-col gap-1 shrink-0">
          {/* Status picker dropdown */}
          <select
            value={currentStatusId}
            onChange={e => handleStatusChange(e.target.value)}
            className="text-[11px] px-2 py-1 border border-ink-200 rounded-md bg-white focus:outline-none focus:ring-1 ring-accent">
            {stageStatuses.map(s => (
              <option key={s.id} value={s.id}>{s.label}</option>
            ))}
          </select>
          <Button size="sm" variant="outline" icon="upload" onClick={onUploadPhoto}>Photo</Button>
          <Button size="sm" variant="ghost" icon="plus" onClick={onAddTask}>Task</Button>
        </div>
      </div>
      {showReason && (
        <div className="px-3 pb-3 flex gap-2 items-center border-t border-soft pt-2">
          <TextField value={reason} onChange={setReason} placeholder="Reason for status change (optional)…" className="flex-1 !text-xs" />
          <Button size="sm" variant="accent" onClick={confirmWithReason}>Confirm</Button>
          <Button size="sm" variant="ghost" onClick={() => { setShowReason(false); setPendingStatus(null); }}>Cancel</Button>
        </div>
      )}
    </div>
  );
}

const Info = ({ label, value }) => (
  <div>
    <div className="text-[10px] uppercase tracking-wider text-ink-500">{label}</div>
    <div className="font-medium mt-0.5">{value || '—'}</div>
  </div>
);

Object.assign(window, { PageSchoolDetail });

</script>

<script type="text/babel">
// My Tasks queue — replaces Employees list per spec
function PageMyTasks({ currentUser, onAddTask, onOpenTask, onJump }) {
  const { tasks, projects } = useStore();
  const [filter, setFilter] = React.useState('mine'); // mine | all
  const [statusFilter, setStatusFilter] = React.useState('open');

  const filtered = tasks.filter(t => {
    if (filter === 'mine' && t.assigneeId !== currentUser.id) return false;
    if (statusFilter === 'open'     && t.status === 'Done') return false;
    if (statusFilter === 'overdue'  && (!isOverdue(t.due) || t.status === 'Done')) return false;
    if (statusFilter === 'done'     && t.status !== 'Done') return false;
    return true;
  });

  const myCount = tasks.filter(t => t.assigneeId === currentUser.id).length;
  const myOverdue = tasks.filter(t => t.assigneeId === currentUser.id && isOverdue(t.due) && t.status !== 'Done').length;

  return (

              <th className="text-left px-4 py-2 font-semibold">Assignee</th>

              <th className="text-left px-4 py-2 font-semibold">Priority</th>
              <th className="text-left px-4 py-2 font-semibold">Status</th>
              <th className="text-left px-4 py-2 font-semibold">Due</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(t => {
              const a = getPerson(t.assigneeId);
              const proj = getProject(t.projectId);
              const sch = t.schoolId ? ALL_SCHOOLS.find(s => s.id === t.schoolId) : null;

              return (
                <tr key={t.id} onClick={() => onOpenTask(t)} className="border-b border-soft hover-row cursor-pointer">
                  <td className="px-4 py-2.5 font-medium">{t.title}</td>

                  <td className="px-4 py-2.5 text-xs">
                    <div className="font-medium">{proj?.name}</div>
                    {sch && <div className="text-ink-500">{sch.code} · {sch.name.slice(0, 30)}</div>}

                  <td className="px-4 py-2.5"><Pill tone={t.priority === 'High' ? 'danger' : t.priority === 'Medium' ? 'warn' : 'soft'}>{t.priority}</Pill></td>
                  <td className="px-4 py-2.5"><Pill tone={t.status === 'Done' ? 'ok' : t.status === 'In Progress' ? 'info' : 'soft'}>{t.status}</Pill></td>
                  <td className={cls('px-4 py-2.5', overdue ? 'text-red-600 font-semibold' : '')}>{fmtDate(t.due)}{overdue && ' ⚠'}</td>
                </tr>
              );
            })}
            {filtered.length === 0 && (
              <tr><td colSpan="6" className="text-center py-8 text-xs text-ink-500 italic">No tasks match these filters.</td></tr>
            )}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

Object.assign(window, { PageMyTasks });

</script>

                <td className="px-3 py-2 text-right tnum">{it.dWh.toLocaleString()}</td>
                <td className="px-3 py-2 text-right tnum">{it.dSite.toLocaleString()}</td>
                <td className="px-3 py-2 text-right tnum font-semibold">{it.installed.toLocaleString()}</td>
                <td className="px-3 py-2"><Pill tone={tone}>{it.status}</Pill></td>
                <td className="px-3 py-2">
                  <span className="inline-flex items-center gap-1 text-[11px] text-info">
                    <Icon name="link" size={11} /> Warehouse
                  </span>
                </td>
                <td className="px-3 py-2 text-right">
                  <div className="flex items-center gap-1 justify-end">
                    <button onClick={() => onEdit(it)} className="p-1 rounded hover:bg-ink-100 text-ink-500 hover:text-ink-900" title="Edit"><Icon name="pencil" size={14} /></button>
                    <button onClick={() => onDelete(it)} className="p-1 rounded hover:bg-ink-100 text-ink-500 hover:text-red-600" title="Delete"><Icon name="trash-2" size={14} /></button>
                  </div>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

function MaterialModal({ open, onClose, onSave, projects, initial }) {
  const [item, setItem] = React.useState('');
  const [projectId, setProjectId] = React.useState(projects[0]?.id || '');
  const [fix, setFix] = React.useState('Fix1');
  const [planned, setPlanned] = React.useState(0);
  const [ordered, setOrdered] = React.useState(0);
  const [dWh, setDWh] = React.useState(0);
  const [dSite, setDSite] = React.useState(0);
  const [installed, setInstalled] = React.useState(0);

  React.useEffect(() => {
    if (open) {
      setItem(initial?.item || '');
      setProjectId(initial?.projectId || projects[0]?.id || '');
      setFix(initial?.fix || 'Fix1');
      setPlanned(initial?.planned ?? 0);
      setOrdered(initial?.ordered ?? 0);
      setDWh(initial?.dWh ?? 0);
      setDSite(initial?.dSite ?? 0);
      setInstalled(initial?.installed ?? 0);
    }
  }, [open, initial]);

  const computeStatus = () => {
    const p = +planned, i = +installed, s = +dSite, w = +dWh, o = +ordered;
    if (i >= p * 0.85) return 'Near Complete';
    if (s >= p * 0.5) return 'Installing';
    if (w >= p * 0.5) return 'In Transit';
    if (o > 0) return 'Ordered';
    return 'Planning';
  };

  return (
    <Modal open={open} onClose={onClose} title={initial ? 'Edit Material Item' : 'Add Material Item'}
      footer={<>
        <Button variant="ghost" onClick={onClose}>Cancel</Button>
        <Button variant="accent" icon="check" onClick={() => {
          if (!item.trim()) return;
          onSave({ ...(initial || {}), item, projectId, fix, planned: +planned, ordered: +ordered, dWh: +dWh, dSite: +dSite, installed: +installed, status: computeStatus() });
          onClose();
        }}>Save</Button>
      </>}>
      <div className="space-y-3">
        <div>
          <label className="text-[11px] font-medium text-ink-700 mb-1 block">Item name</label>
          <TextField value={item} onChange={setItem} placeholder="e.g. Panels (550W)" />
        </div>
        <div className="grid grid-cols-2 gap-3">
          <div>
            <label className="text-[11px] font-medium text-ink-700 mb-1 block">Category</label>
            <Select value={fix} onChange={setFix} options={['Fix1','Fix2']} className="w-full" />
          </div>
          <div>
            <label className="text-[11px] font-medium text-ink-700 mb-1 block">Project</label>
            <Select value={projectId} onChange={setProjectId} options={projects.map(p => ({ value: p.id, label: p.name }))} className="w-full" />
          </div>
        </div>
        <div className="grid grid-cols-3 gap-2">
          {[['Planned qty', planned, setPlanned], ['Ordered', ordered, setOrdered], ['At Warehouse', dWh, setDWh],
            ['At Site', dSite, setDSite], ['Installed', installed, setInstalled]].map(([lbl, val, setter]) => (
            <div key={lbl}>
              <label className="text-[11px] font-medium text-ink-700 mb-1 block">{lbl}</label>
              <TextField value={val} onChange={setter} type="number" />
            </div>
          ))}
        </div>
        <div className="text-[11px] text-ink-500 bg-ink-50 rounded p-2">Status auto-computes from quantities when saved.</div>
      </div>
    </Modal>
  );
}

function ImportMaterialsModal({ open, onClose }) {
  const [importing, setImporting] = React.useState(false);
  const [done, setDone] = React.useState(false);
  const downloadTemplate = () => {
    const csv = ['Item,Category,Project,Planned,Ordered,AtWarehouse,AtSite,Installed', 'Panels (550W),Fix1,p1,11200,11200,9800,7200,6900'].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'materials-import-template.csv';
    a.click();
  };
  const handleImport = () => {
    setImporting(true);
    setTimeout(() => { setImporting(false); setDone(true); }, 1200);
  };
  React.useEffect(() => { if (open) setDone(false); }, [open]);
  return (
    <Modal open={open} onClose={onClose} title="Import Materials"
      footer={<>
        <Button variant="ghost" onClick={onClose}>Close</Button>
        {!done && <Button variant="accent" icon="upload" onClick={handleImport} disabled={importing}>{importing ? 'Importing…' : 'Import'}</Button>}
      </>}>
      <div className="space-y-4">
        <div className="bg-sky-50 border border-sky-200 rounded-md p-3 text-xs text-sky-800">
          <div className="font-semibold mb-1">Import instructions</div>
          <ol className="list-decimal list-inside space-y-1">
            <li>Download the template below</li>
            <li>Fill in your materials (one row per item)</li>
            <li>Upload the completed file</li>
          </ol>
        </div>
        <Button variant="outline" icon="file-spreadsheet" onClick={downloadTemplate}>Download Excel template (.csv)</Button>
        {!done ? (
          <div className="border-2 border-dashed border-soft rounded-md p-8 text-center text-xs text-ink-500">
            <Icon name="upload" size={20} />
            <div className="mt-2 font-medium">Drop your CSV file here or click to browse</div>
            <input type="file" className="hidden" />
          </div>
        ) : (
          <div className="bg-emerald-50 border border-emerald-200 rounded-md p-4 text-sm text-emerald-800 text-center">
            <Icon name="check-circle" size={20} />
            <div className="mt-1 font-semibold">Import complete</div>
            <div className="text-xs text-emerald-700">Materials have been added to the list.</div>
          </div>
        )}
      </div>
    </Modal>
  );
}

function PageMaterials({ projects }) {
  const { materials, addMaterial, updateMaterial, deleteMaterial } = useStore();

  const [projectFilter, setProjectFilter] = React.useState('All');
  const [regionFilter, setRegionFilter] = React.useState('All');
  const [search, setSearch] = React.useState('');
  const [modal, setModal] = React.useState({ open: false, initial: null });
  const [importOpen, setImportOpen] = React.useState(false);
  const [confirmDelete, setConfirmDelete] = React.useState(null);

  const filtered = (materials || MATERIALS).filter(m => !m.archived).filter(m => {
    if (projectFilter !== 'All' && m.projectId !== projectFilter) return false;
    if (regionFilter !== 'All') {
      const p = projects.find(x => x.id === m.projectId);
      if (p?.region !== regionFilter) return false;
    }
    if (search && !m.item.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const fix1 = filtered.filter(m => m.fix === 'Fix1');
  const fix2 = filtered.filter(m => m.fix === 'Fix2');

  const handleSave = (data) => {
    if (data.id) {
      updateMaterial(data.id, data);
    } else {
      addMaterial(data);
    }
  };

  const handleDelete = (item) => {
    deleteMaterial(item.id);
    setConfirmDelete(null);
  };

  return (
    <div className="p-6 space-y-5">
      <div className="flex items-end justify-between gap-3 flex-wrap">
        <div>
          <h1 className="text-2xl font-bold ink-on-dark">Materials</h1>
          <p className="text-xs text-ink-500 ink-muted-on-dark mt-0.5">Fix1 & Fix2 inventory · full CRUD · linked to warehouse</p>
        </div>
        <div className="flex items-center gap-2 flex-wrap">
          <Select value={projectFilter} onChange={setProjectFilter} options={[{value:'All',label:'All projects'}, ...projects.map(p => ({ value: p.id, label: p.name }))]} />
          <Select value={regionFilter} onChange={setRegionFilter} options={[{value:'All',label:'All regions'}, ...REGIONS.map(r=>({value:r,label:r}))]} />
          <TextField value={search} onChange={setSearch} placeholder="Search items…" className="!w-48" />
          <Button icon="upload" variant="outline" onClick={() => setImportOpen(true)}>Import</Button>
          <Button icon="plus" variant="accent" onClick={() => setModal({ open: true, initial: null })}>Add Item</Button>
        </div>
      </div>

      <div className="text-[11px] text-ink-500 bg-ink-50 border border-soft rounded-md p-2.5">
        All material quantities are tracked from plan → order → warehouse → site → installed. Edit any row to update figures.
        Deleted items move to the Recycle Bin and can be restored.
      </div>

      <Card>
        <SectionTitle icon="package" title="Fix1 — Structural & DC"
          subtitle="Panels, Foundations, Structures, End Clamps, Small Blocks, Cable Trays, DC Cables, Fix1 Accessories"
          action={<span className="text-xs text-ink-500">{fix1.length} items</span>} />
        <MaterialTable items={fix1} projects={projects} onEdit={it => setModal({ open: true, initial: it })} onDelete={it => setConfirmDelete(it)} />
      </Card>

      <Card>
        <SectionTitle icon="zap" title="Fix2 — AC & Monitoring"
          subtitle="Inverter, SMDB, MCCB, Data Logger, AC Cables, Export Meter, CTs, Data Cable, EMT Pipe, Fix2 Accessories"
          action={<span className="text-xs text-ink-500">{fix2.length} items</span>} />
        <MaterialTable items={fix2} projects={projects} onEdit={it => setModal({ open: true, initial: it })} onDelete={it => setConfirmDelete(it)} />
      </Card>

      <MaterialModal open={modal.open} onClose={() => setModal({ open: false, initial: null })} onSave={handleSave} projects={projects} initial={modal.initial} />
      <ImportMaterialsModal open={importOpen} onClose={() => setImportOpen(false)} />

      <Modal open={!!confirmDelete} onClose={() => setConfirmDelete(null)} title="Delete material item"
        footer={<>
          <Button variant="ghost" onClick={() => setConfirmDelete(null)}>Cancel</Button>
          <Button variant="danger" icon="trash-2" onClick={() => handleDelete(confirmDelete)}>Delete (moves to Recycle Bin)</Button>
        </>}>
        <p className="text-sm">Delete <strong>{confirmDelete?.item}</strong>? It will move to the Recycle Bin and can be restored.</p>
      </Modal>
    </div>
  );
}

Object.assign(window, { PageMaterials });

</script>
<script type="text/babel">
// Page 4 — Financials (wired to store-r2 financialEntries with auto-rollup)

  const [milestone, setMile]  = React.useState('');
  const [notes, setNotes]     = React.useState('');

  React.useEffect(() => {

      setPid(initial?.projectId || projects[0]?.id || '');

      setAmount(initial?.amount != null ? String(initial.amount) : '');

      setNotes(initial?.notes || '');

            <TextField value={date} onChange={setDate} type="date" />

        </div>
        <div className="grid grid-cols-2 gap-3">
          <div>
            <label className="text-[11px] font-medium text-ink-700 mb-1 block">Project</label>

            <label className="text-[11px] font-medium text-ink-700 mb-1 block">Contractor (optional)</label>
            <Select value={cId} onChange={setCId} options={[{value:'',label:'— none —'}, ...CONTRACTORS.map(c=>({value:c.id,label:c.name}))]} className="w-full" />
          </div>
        </div>
        <div>
          <label className="text-[11px] font-medium text-ink-700 mb-1 block">Amount (SAR)</label>
          <TextField value={amount} onChange={setAmount} type="number" placeholder="0" />

          <TextField value={milestone} onChange={setMile} placeholder="e.g. Advance Payment, 3rd milestone" />
        </div>
        <div>
          <label className="text-[11px] font-medium text-ink-700 mb-1 block">Notes</label>

        <div className="text-[11px] text-ink-500">

}

function EntriesTab({ projects, onAdd }) {
  const { financialEntries, updateFinancialEntry, deleteFinancialEntry, finRollup } = useStore();
  const [editEntry, setEditEntry] = React.useState(null);
  const [projFilter, setProjFilter] = React.useState('all');
  const [typeFilter, setTypeFilter] = React.useState('all');

  const roll = finRollup ? finRollup() : { receipts: 0, receivables: 0, payments: 0, payables: 0, net: 0 };

  const live = (financialEntries || []).filter(e => !e.archived).filter(e => {
    if (projFilter !== 'all' && e.projectId !== projFilter) return false;
    if (typeFilter !== 'all' && e.type !== typeFilter) return false;
    return true;
  });

  const typeTone = { Receipt:'ok', Receivable:'warn', Payment:'info', Payable:'danger' };

  return (
    <div className="space-y-4">
      <div className="bg-sky-50 border border-sky-200 rounded-md p-3 text-xs text-sky-800 flex items-start gap-2">
        <Icon name="info" size={14} />
        <span>All financial KPIs are computed from the entries below. Add or edit entries to update KPIs across all dashboards.</span>
      </div>

      <div className="grid grid-cols-5 gap-2 text-center">
        {[['Received', roll.receipts, 'text-emerald-700'], ['Receivable', roll.receivables, 'text-amber-600'],
          ['Paid out', roll.payments, 'text-sky-700'], ['Payable', roll.payables, 'text-red-600'],
          ['Net cash', roll.net, roll.net >= 0 ? 'text-emerald-700' : 'text-red-600']].map(([l,v,cls]) => (
          <div key={l} className="border border-soft rounded-md p-3">

        <Select value={typeFilter} onChange={setTypeFilter}
          options={[{value:'all',label:'All types'},{value:'Receipt',label:'Receipt'},{value:'Receivable',label:'Receivable'},{value:'Payment',label:'Payment'},{value:'Payable',label:'Payable'}]} />
        <div className="ml-auto text-xs text-ink-500">{live.length} entries</div>

              <th className="text-left px-3 py-2">Notes</th>
              <th className="text-right px-3 py-2"></th>
            </tr>
          </thead>
          <tbody>
            {live.map(e => {
              const p = projects.find(x=>x.id===e.projectId);

              return (
                <tr key={e.id} className="border-t border-soft hover-row">
                  <td className="px-3 py-2"><Pill tone={typeTone[e.type]||'soft'}>{e.type}</Pill></td>

                  <td className="px-3 py-2 text-xs">{e.relatedMilestone || '—'}</td>

function PageFinancials({ projects, fin }) {
  const { financialEntries, addFinancialEntry, finRollup } = useStore();
  const [tab, setTab] = React.useState('Per Project');
  const [entryModal, setEntryModal] = React.useState(false);
  const { LineChart, Line, BarChart, Bar, ResponsiveContainer, XAxis, YAxis, Tooltip, CartesianGrid, Legend } = window.Recharts;

  // Use store entries for rollup KPIs if available, else fall back to static fin
  const hasEntries = financialEntries && financialEntries.length > 0;
  const roll = (finRollup && hasEntries) ? finRollup() : null;

  const totals = projects.reduce((a, p) => {
    const f = (fin || []).find(x => x.projectId === p.id) || { invoiced: 0, received: 0, outstanding: 0 };
    a.value += p.value;
    a.invoiced += f.invoiced || 0;
    a.received += f.received || 0;
    a.outstanding += f.outstanding || 0;
    return a;
  }, { value: 0, invoiced: 0, received: 0, outstanding: 0 });

  const kpiReceived   = roll ? roll.receipts    : totals.received;
  const kpiReceivable = roll ? roll.receivables  : totals.outstanding;
  const kpiPaid       = roll ? roll.payments     : 0;
  const kpiPayable    = roll ? roll.payables     : 0;

  const aging = [
    { bucket: '0–30',  amount: 18_400_000 },
    { bucket: '31–60', amount: 12_800_000 },
    { bucket: '61–90', amount: 6_200_000  },
    { bucket: '90+',   amount: 4_100_000  },

          ['Total Contract Value', SAR(totals.value), 'banknote', null],
          ['Received',   SAR(kpiReceived),   'check-circle', 'text-emerald-700'],
          ['Receivable', SAR(kpiReceivable), 'alert-circle', 'text-amber-600'],

          <Card key={l} padding="p-4">
            <div className="flex items-center justify-between">
              <div>
                <div className="text-[10px] uppercase tracking-wider text-ink-500 ink-muted-on-dark">{l}</div>
                <div className={cls(vCls || 'ink-on-dark', 'text-2xl font-bold tnum mt-1')}>SAR {v}</div>

              <div className="w-9 h-9 rounded-md bg-ink-50 flex items-center justify-center text-ink-500">
                <Icon name={ic} size={18} />
              </div>
            </div>
          </Card>
        ))}
      </div>

      <Card padding="p-0">
        <div className="px-5 pt-3">
          <Tabs tabs={['Per Project','Cash Flow','Entries']} active={tab} onChange={setTab} />
        </div>

        <div className="p-5">
          {tab === 'Entries' && (
            <EntriesTab projects={projects} onAdd={() => setEntryModal(true)} />
          )}

          {tab === 'Cash Flow' && (
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
              <div className="lg:col-span-2">
                <SectionTitle title="Cumulative Invoiced vs Received (SAR M)" />
                <div style={{ width: '100%', height: 260 }}>
                  <ResponsiveContainer>
                    <LineChart data={FIN_CURVE}>
                      <CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0" />
                      <XAxis dataKey="month" stroke="#94A3B8" fontSize={11} />
                      <YAxis stroke="#94A3B8" fontSize={11} />

                      <Legend wrapperStyle={{ fontSize: 12 }} />
                      <Line type="monotone" dataKey="invoiced" stroke="#0B2545" strokeWidth={2} dot={false} />
                      <Line type="monotone" dataKey="received" stroke="#B8860B" strokeWidth={2} dot={false} />
                    </LineChart>
                  </ResponsiveContainer>
                </div>

            setEntryModal(null);
          }} />

}

function MilestoneEntryModal({ open, onClose, template, existing, onSave }) {
  const [values, setValues] = React.useState({});
  React.useEffect(() => {
    if (open) setValues(existing?.values || {});
  }, [open, existing]);
  const setValue = (id, v) => setValues(prev => ({ ...prev, [id]: v }));

  return (
    <Modal open={open} onClose={onClose} title={`Milestone: ${template.name}`}
      footer={<>
        <Button variant="ghost" onClick={onClose}>Cancel</Button>
        <Button variant="accent" icon="check" onClick={() => { onSave(values); }}>Save entry</Button>
      </>}>
      <div className="space-y-3">
        <div className="text-[11px] text-ink-500">Weight: {template.weight}% of overall score</div>

          <div key={f.id}>
            <label className="text-[11px] font-medium text-ink-700 mb-1 block">{f.label}</label>
            {f.type === 'number' && (
              <TextField value={values[f.id] || ''} onChange={v => setValue(f.id, v)} type="number" placeholder="0" />
            )}
            {f.type === 'date' && (
              <TextField value={values[f.id] || ''} onChange={v => setValue(f.id, v)} type="date" />
            )}
            {f.type === 'text' && (
              <TextField value={values[f.id] || ''} onChange={v => setValue(f.id, v)} placeholder={f.label} />
            )}
            {f.type === 'file' && (
              <div className="flex items-center gap-2">
                <div className="flex-1 border-2 border-dashed border-soft rounded-md p-2 text-center text-xs text-ink-500">

  );
}

      <div className="space-y-1">
        {sorted.map((s, i) => (
          editId === s.id
            ? <LifecycleStageRow key={s.id} stage={s} onSave={p => { updateLifecycleStage(s.id, p); setEditId(null); }} onCancel={() => setEditId(null)} />

              <div key={s.id} className="flex items-center gap-2 border border-soft rounded-md p-2.5">

                  <button onClick={() => reorderLifecycleStage(s.id, -1)} disabled={i === 0} className="p-0.5 hover:bg-ink-100 rounded disabled:opacity-30"><Icon name="chevron-up" size={12} /></button>

                </div>
                <div className="w-3 h-3 rounded-full shrink-0" style={{ background: s.color }} />
                <span className="text-xs text-ink-500 tnum w-6">{i + 1}</span>
                <span className="text-sm flex-1 font-medium">{s.name}</span>
                {s.criteria && <span className="text-[11px] text-ink-500 truncate max-w-[200px] hidden lg:block">{s.criteria}</span>}
                <div className="flex gap-1">
                  <button onClick={() => setEditId(s.id)} className="p-1 rounded hover:bg-ink-100 text-ink-500" title="Edit"><Icon name="pencil" size={13} /></button>
                  <button onClick={() => deleteLifecycleStage(s.id)} className="p-1 rounded hover:bg-ink-100 text-ink-500 hover:text-red-600" title="Delete"><Icon name="trash-2" size={13} /></button>

        <LifecycleStageRow stage={{ name: '', color: '#13315C', criteria: '' }}

  const [name, setName] = React.useState(stage.name);
  const [color, setColor] = React.useState(stage.color || '#13315C');
  const [criteria, setCriteria] = React.useState(stage.criteria || '');
  return (
    <div className="border border-accent rounded-md p-3 space-y-2 bg-accent-soft">
      <div className="grid grid-cols-3 gap-2">
        <div className="col-span-2">
          <label className="text-[11px] font-medium text-ink-700 mb-1 block">Stage name</label>
          <TextField value={name} onChange={setName} placeholder="Stage name" />

        <div>
          <label className="text-[11px] font-medium text-ink-700 mb-1 block">Color</label>

<script type="text/babel">
// Root App — role-based routing, central store, task/notif/escalation wiring

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "darkMode": false,
  "accent": "gold"
}/*EDITMODE-END*/;

function AppInner() {
  const store = useStore();
  const { tasks, notifs, projects, schools, escalations,
          addTask, sendTaskMessage, sendTaskReminder, updateTask,
          markNotifRead, markAllNotifsRead, addEscalation } = store;

  const [role, setRole] = React.useState('Program Manager');
  const [page, setPage] = React.useState('home');
  const [activeProjectId, setActiveProjectId] = React.useState(null);
  const [activeSchoolId,  setActiveSchoolId]  = React.useState(null);
  const [activeEscId,     setActiveEscId]     = React.useState(null);
  const [search, setSearch] = React.useState('');
  const [notifsOpen, setNotifsOpen] = React.useState(false);

  const [taskModalOpen, setTaskModalOpen] = React.useState(false);
  const [taskDefaults,  setTaskDefaults]  = React.useState({});
  const [openTask, setOpenTask] = React.useState(null);
  const [escModalOpen, setEscModalOpen] = React.useState(false);
  const [escDefaults,   setEscDefaults]   = React.useState({});

  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const accentClass = `accent-${tweaks.accent}`;
  const themeClass  = tweaks.darkMode ? 'dark-mode' : '';

  const currentUser = React.useMemo(() => {
    if (role === 'VP / Executive')  return PEOPLE.find(p => p.id === 'u13');
    if (role === 'Program Manager') return PEOPLE.find(p => p.id === 'u1');
    if (role === 'Project Manager') return PEOPLE.find(p => p.id === 'u2');
    if (role === 'Site Engineer')   return PEOPLE.find(p => p.id === 'u8');
    return PEOPLE[0];
  }, [role]);

  React.useEffect(() => {
    setPage('home');
    setActiveProjectId(null);
    setActiveSchoolId(null);
    setActiveEscId(null);
  }, [role]);

  const unread = notifs.filter(n => !n.read).length;

  const openProject = (id) => { setActiveProjectId(id); setActiveSchoolId(null); setPage('project-detail'); };
  const openSchoolsList = (projectId) => { setActiveProjectId(projectId); setActiveSchoolId(null); setPage('schools-list'); };
  const openSchool = (id) => { setActiveSchoolId(id); setPage('school-detail'); };
  const openEsc = (id) => { setActiveEscId(id); setPage('escalation-detail'); };

  const onAddTask = (defaults = {}) => { setTaskDefaults(defaults); setTaskModalOpen(true); };
  const onCreateTask = (data) => { addTask({ ...data, createdById: currentUser.id }); };
  const onOpenTask  = (t) => setOpenTask(t);

  const onNewEscalation = (defaults = {}) => { setEscDefaults(defaults); setEscModalOpen(true); };
  const onCreateEsc = (data) => { addEscalation(data); };

  const navigateNotif = (n) => {
    markNotifRead(n.id);
    setNotifsOpen(false);
    if (n.target.kind === 'school') {
      const sch = schools.find(s => s.id === n.target.id);
      if (sch) { setActiveProjectId(sch.projectId); setActiveSchoolId(sch.id); setPage('school-detail'); }
    } else if (n.target.kind === 'project') {
      openProject(n.target.id);
    } else if (n.target.kind === 'task') {
      const t = tasks.find(x => x.id === n.target.id);
      if (t) setOpenTask(t);
    } else if (n.target.kind === 'escalation') {
      openEsc(n.target.id);
    }
  };

  const renderPage = () => {
    if (page === 'escalation-detail' && activeEscId) {
      return <PageEscalationDetail id={activeEscId} onBack={() => setPage(role === 'VP / Executive' ? 'home' : 'my-escalations')} currentUser={currentUser} />;
    }
    if (page === 'project-detail' && activeProjectId) {
      const p = projects.find(x => x.id === activeProjectId);
      return <PageProject project={p} onBack={() => setPage('home')}
        onOpenSchools={openSchoolsList}
        onAddTask={onAddTask} onOpenTask={onOpenTask} onEscalate={() => onNewEscalation({ projectId: p.id, title: `${p.name} — ` })} />;
    }
    if (page === 'schools-list' && activeProjectId) {
      const p = projects.find(x => x.id === activeProjectId);
      return <PageSchoolsList project={p} onBack={() => setPage('project-detail')}
        onOpenSchool={openSchool} onAddTask={onAddTask} />;
    }
    if (page === 'school-detail' && activeSchoolId) {
      return <PageSchoolDetail schoolId={activeSchoolId}
        onBack={() => setPage(activeProjectId ? 'schools-list' : 'home')}
        onAddTask={onAddTask} currentUser={currentUser}
        onEscalate={(sch) => onNewEscalation({ projectId: sch.projectId, schoolId: sch.id, title: `${sch.code} ${sch.name} — ` })} />;
    }

    // VP / Executive — split home from programs
    if (role === 'VP / Executive') {
      if (page === 'home')        return <PageVPDashboard onOpenEscalation={openEsc} />;
      if (page === 'projects')    return <PageVPPrograms projects={projects} onOpen={openProject} />;
      if (page === 'escalations') return <PageVPDashboard onOpenEscalation={openEsc} />;
      if (page === 'financials')  return <PageFinancials projects={projects} fin={FIN} />;
      if (page === 'reports')     return <PageReports projects={projects} />;
      return <PageVPDashboard onOpenEscalation={openEsc} />;
    }

    if (role === 'Site Engineer') {
      if (page === 'home')     return <PageSiteEngineer currentUser={currentUser} onOpenSchool={openSchool} onAddTask={onAddTask} />;
      if (page === 'tasks')    return <PageMyTasks currentUser={currentUser} onAddTask={onAddTask} onOpenTask={onOpenTask} />;
      if (page === 'projects') {
        const p = projects.find(x => x.id === currentUser.projectId);
        return <PageProject project={p} onBack={() => setPage('home')} onOpenSchools={openSchoolsList} onAddTask={onAddTask} onOpenTask={onOpenTask} onEscalate={() => onNewEscalation({ projectId: p.id, title: `${p.name} — ` })} />;
      }
      return <PageSiteEngineer currentUser={currentUser} onOpenSchool={openSchool} onAddTask={onAddTask} />;
    }

    if (role === 'Project Manager') {
      const myProject = projects.find(x => x.id === currentUser.projectId);
      if (page === 'home') return <PageProject project={myProject} onBack={() => {}} onOpenSchools={openSchoolsList} onAddTask={onAddTask} onOpenTask={onOpenTask} onEscalate={() => onNewEscalation({ projectId: myProject.id, title: `${myProject.name} — ` })} />;
      if (page === 'schools' && myProject)  return <PageSchoolsList project={myProject} onBack={() => setPage('home')} onOpenSchool={openSchool} onAddTask={onAddTask} />;
      if (page === 'tasks')      return <PageMyTasks currentUser={currentUser} onAddTask={onAddTask} onOpenTask={onOpenTask} />;
      if (page === 'my-escalations') return <PageMyEscalations currentUser={currentUser} onOpen={openEsc} onNew={() => onNewEscalation({ projectId: myProject?.id })} />;
      if (page === 'materials')  return <PageMaterials projects={projects.filter(p => p.id === currentUser.projectId)} />;
      if (page === 'financials') return <PageFinancials projects={projects.filter(p => p.id === currentUser.projectId)} fin={FIN.filter(f => f.projectId === currentUser.projectId)} />;
      if (page === 'reports')    return <PageReports projects={projects.filter(p => p.id === currentUser.projectId)} />;
      return <PageProject project={myProject} onBack={() => {}} onOpenSchools={openSchoolsList} onAddTask={onAddTask} onOpenTask={onOpenTask} onEscalate={() => onNewEscalation({ projectId: myProject.id })} />;
    }

    // Program Manager — distinct dashboard from Projects
    if (page === 'home')                          return <PagePMDashboard projects={projects} currentUser={currentUser} onOpenEscalation={openEsc} onNewEscalation={() => onNewEscalation({})} />;
    if (page === 'projects')                      return <PageDashboard projects={projects} onOpenProject={openProject} />;
    if (page === 'tasks')                         return <PageMyTasks currentUser={currentUser} onAddTask={onAddTask} onOpenTask={onOpenTask} />;
    if (page === 'my-escalations')                return <PageMyEscalations currentUser={currentUser} onOpen={openEsc} onNew={() => onNewEscalation({})} />;
    if (page === 'materials')                     return <PageMaterials projects={projects} />;
    if (page === 'financials')                    return <PageFinancials projects={projects} fin={FIN} />;
    if (page === 'contractors')                   return <PageContractors contractors={CONTRACTORS} projects={projects} />;
    if (page === 'reports')                       return <PageReports projects={projects} />;
    if (page === 'settings')                      return <PageSettings />;
    if (page === 'recycle-bin')                   return <PageRecycleBin />;
    return <PagePMDashboard projects={projects} currentUser={currentUser} onOpenEscalation={openEsc} onNewEscalation={() => onNewEscalation({})} />;
  };

  const sidebarActive = (page === 'project-detail' || page === 'schools-list' || page === 'school-detail')
    ? (role === 'Site Engineer' ? 'projects' : role === 'Project Manager' ? 'home' : 'projects')
    : page;

  return (
    <div className={cls('min-h-screen flex', accentClass, themeClass)}>
      <Sidebar active={sidebarActive} role={role} currentUser={currentUser}
        onNav={(id) => { setPage(id); setActiveProjectId(null); setActiveSchoolId(null); setActiveEscId(null); }} />

      <div className="flex-1 min-w-0 flex flex-col">
        <TopBar role={role} onRoleChange={setRole} currentUser={currentUser}
          search={search} onSearch={setSearch}
          onOpenNotifs={() => setNotifsOpen(true)} unreadCount={unread} />

        <main className="flex-1 min-w-0 overflow-auto">{renderPage()}</main>
      </div>

      <NotifPanel open={notifsOpen} onClose={() => setNotifsOpen(false)} items={notifs}
        onNavigate={navigateNotif} onMarkAllRead={markAllNotifsRead} />

      <TaskModal open={taskModalOpen} onClose={() => setTaskModalOpen(false)}
        projects={projects} schools={schools} defaults={taskDefaults} onCreate={onCreateTask} />

      <TaskDetailPanel task={openTask} open={!!openTask} onClose={() => setOpenTask(null)}
        currentUserId={currentUser.id}
        onSendMessage={(id) => { sendTaskMessage(id, { userId: currentUser.id, text: 'Following up — please share status.' }); }}
        onSendReminder={(id) => { sendTaskReminder(id); }}
        onMarkDone={(id) => { updateTask(id, { status: 'Done' }); setOpenTask(null); }} />

      <EscalationModal open={escModalOpen} onClose={() => setEscModalOpen(false)}
        defaults={escDefaults} projects={projects} currentUser={currentUser} onCreate={onCreateEsc} />

      <TweaksPanel title="Tweaks">
        <TweakSection title="Theme">
          <TweakToggle label="Dark navy theme" value={tweaks.darkMode} onChange={v => setTweak('darkMode', v)} />
          <TweakRadio label="Accent" value={tweaks.accent} onChange={v => setTweak('accent', v)}
            options={[{value:'gold',label:'Gold'},{value:'steel',label:'Steel'},{value:'red',label:'Red'}]} />
        </TweakSection>
        <TweakSection title="Tip">
          <p className="text-xs text-ink-500">Switch roles in the top bar. Use the Escalate button on Project / School pages to raise a flag to the VP.</p>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

function App() {
  return <StoreProvider><AppInner /></StoreProvider>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
