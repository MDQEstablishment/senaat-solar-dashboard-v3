// tweaks-panel.jsx
// Reusable Tweaks shell + form-control helpers.
//
// Owns the host protocol (listens for __activate_edit_mode / __deactivate_edit_mode,
// posts __edit_mode_available / __edit_mode_set_keys / __edit_mode_dismissed) so
// individual prototypes don't re-roll it. Ships a consistent set of controls so you
// don't hand-draw <input type="range">, segmented radios, steppers, etc.
//
// Usage (in an HTML file that loads React + Babel):
//
//   const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{

//     "fontSize": 16,
//     "density": "regular",

//           <TweakSection label="Typography" />

//                        onChange={(v) => setTweak('fontSize', v)} />
//           <TweakRadio  label="Density" value={t.density}
//                        options={['compact', 'regular', 'comfy']}
//                        onChange={(v) => setTweak('density', v)} />
//           <TweakSection label="Theme" />
//           <TweakColor  label="Primary" value={t.primaryColor}
//                        onChange={(v) => setTweak('primaryColor', v)} />
//           <TweakToggle label="Dark mode" value={t.dark}
//                        onChange={(v) => setTweak('dark', v)} />
//         </TweaksPanel>
//       </div>
//     );
//   }
//
// ─────────────────────────────────────────────────────────────────────────────

    background:transparent;flex-shrink:0}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}

}

Object.assign(window, {

  TweakText, TweakNumber, TweakColor, TweakButton,

function progressSchools(schools, peakStage, rng, projectStartIso) {
  const start = new Date(projectStartIso).getTime();
  const day = 86400000;
  schools.forEach((sch, idx) => {
    // Each school's "reached" stage is a noisy gaussian around peakStage
    const noise = (rng() + rng() + rng() - 1.5) * 3.2;  // ~Normal(0, ~1.6)
    let reached = Math.round(peakStage + noise);
    // Some schools hit issues
    const r = rng();
    if (r < 0.04) {
      sch.remark = 'Excluded';
      reached = Math.max(0, Math.floor(reached / 2));
    } else if (r < 0.06) {
      sch.remark = 'Access issue';
      reached = Math.min(reached, peakStage - 2);
    } else if (r < 0.07) {
      sch.remark = 'Dismantled';
      reached = Math.max(0, reached - 4);
    } else if (r < 0.075) {
      sch.remark = 'Demolished';
      reached = Math.max(0, reached - 6);
    } else if (r < 0.085) {
      sch.remark = 'Closed';
    }
    reached = Math.max(0, Math.min(SCHOOL_STAGES.length, reached));

    // Mark stages 0..reached-1 as done with realistic dates
    let cursor = start;
    for (let s = 0; s < reached; s++) {
      cursor += Math.floor((10 + rng() * 25)) * day;
      const personIds = ['u8', 'u9', 'u10', 'u12', 'u14', 'u15'];
      const by = personIds[Math.floor(rng() * personIds.length)];
      sch.stages[s] = { done: true, date: new Date(cursor).toISOString(), by };
    }
    if (reached > 0) {
      const lastStage = sch.stages[reached - 1];
      sch.lastUpdate = { by: lastStage.by, when: lastStage.date };
    }

    }
  });
}

    width: size,
    height: size,
    viewBox: '0 0 24 24',
    fill: 'none',

<script type="text/babel">
// Shared UI primitives

const cls = (...xs) => xs.filter(Boolean).join(' ');

const Avatar = ({ initials, size = 28, color = '#13315C' }) => (
  <div className="rounded-full flex items-center justify-center text-white font-semibold"
    style={{ width: size, height: size, background: color, fontSize: size * 0.4 }}>
    {initials}
  </div>
);

const Pill = ({ children, tone = 'neutral', className = '' }) => {
  const tones = {
    neutral: 'bg-ink-100 text-ink-700',
    navy:    'bg-navy-900 text-white',
    gold:    'bg-amber-100 text-amber-800',
    ok:      'bg-emerald-100 text-emerald-800',
    warn:    'bg-amber-100 text-amber-800',
    danger:  'bg-red-100 text-red-800',
    info:    'bg-sky-100 text-sky-800',
    soft:    'bg-ink-50 text-ink-700 border border-ink-200',
  };
  return <span className={cls('inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-medium', tones[tone], className)}>{children}</span>;
};

const StatusPill = ({ status }) => {
  const map = { 'On Track': 'ok', 'At Risk': 'warn', 'Delayed': 'danger', 'Paid':'ok','Due':'warn','Scheduled':'soft' };
  return <Pill tone={map[status] || 'neutral'}>● {status}</Pill>;
};

const ProgressBar = ({ value, color = 'var(--accent)', height = 6, track = '#E2E8F0' }) => (
  <div className="w-full rounded-full overflow-hidden" style={{ background: track, height }}>
    <div style={{ width: `${Math.max(0, Math.min(100, value))}%`, background: color, height: '100%', transition: 'width .3s' }} />
  </div>
);

const Card = ({ children, className = '', padding = 'p-5' }) => (
  <div className={cls('surface border rounded-xl shadow-card', padding, className)}>{children}</div>
);

const SectionTitle = ({ icon, title, action, subtitle, className = '' }) => (
  <div className={cls('flex items-end justify-between mb-3', className)}>
    <div>
      <h3 className="text-[15px] font-semibold flex items-center gap-2">
        {icon && <Icon name={icon} size={16} />}
        {title}
      </h3>
      {subtitle && <p className="text-xs text-ink-500 mt-0.5">{subtitle}</p>}
    </div>
    {action}
  </div>
);

const Button = ({ children, variant = 'primary', size = 'md', icon, onClick, className = '', type = 'button', disabled }) => {
  const sizes = { sm: 'px-2.5 py-1 text-xs', md: 'px-3 py-1.5 text-sm', lg: 'px-4 py-2 text-sm' };
  const variants = {
    primary: 'bg-navy-900 text-white hover:bg-navy-800',
    accent:  'text-white hover:opacity-95 bg-accent',
    ghost:   'bg-transparent hover:bg-ink-100 text-ink-700',
    outline: 'border border-ink-200 hover:bg-ink-50 text-ink-700',
    danger:  'bg-red-600 text-white hover:bg-red-700',
  };
  return (
    <button type={type} disabled={disabled} onClick={onClick}
      className={cls('inline-flex items-center gap-1.5 rounded-md font-medium transition disabled:opacity-50',
        sizes[size], variants[variant], className)}>
      {icon && <Icon name={icon} size={size === 'sm' ? 12 : 14} />}
      {children}
    </button>
  );
};

const TextField = ({ value, onChange, placeholder, type='text', className='' }) => (
  <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
    className={cls('w-full px-2.5 py-1.5 text-sm rounded-md border border-ink-200 bg-white focus:outline-none focus:ring-2 ring-accent', className)} />
);

const Select = ({ value, onChange, options, className='' }) => (
  <select value={value} onChange={e => onChange(e.target.value)}
    className={cls('px-2.5 py-1.5 text-sm rounded-md border border-ink-200 bg-white focus:outline-none focus:ring-2 ring-accent', className)}>
    {options.map(o => typeof o === 'string'
      ? <option key={o} value={o}>{o}</option>
      : <option key={o.value} value={o.value}>{o.label}</option>
    )}
  </select>
);

const Tabs = ({ tabs, active, onChange }) => (
  <div className="border-b border-soft flex items-center gap-1 overflow-x-auto scrollbar-thin">
    {tabs.map(t => (
      <button key={t} onClick={() => onChange(t)}
        className={cls('px-3 py-2 text-sm font-medium whitespace-nowrap border-b-2 -mb-px',
          active === t ? 'border-accent text-accent' : 'border-transparent text-ink-700 hover:text-ink-900')}>
        {t}
      </button>
    ))}
  </div>
);

const Modal = ({ open, onClose, title, children, footer, wide }) => {
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-40 bg-black/40 flex items-center justify-center p-4" onClick={onClose}>
      <div onClick={e => e.stopPropagation()}
        className={cls('surface border rounded-xl shadow-pop w-full max-h-[90vh] overflow-auto scrollbar-thin', wide ? 'max-w-3xl' : 'max-w-md')}>
        <div className="flex items-center justify-between px-5 py-3 border-b border-soft">
          <h3 className="text-sm font-semibold">{title}</h3>
          <button onClick={onClose} className="text-ink-500 hover:text-ink-900"><Icon name="x" size={16} /></button>
        </div>
        <div className="p-5">{children}</div>
        {footer && <div className="px-5 py-3 border-t border-soft flex justify-end gap-2 surface-2">{footer}</div>}
      </div>
    </div>
  );
};

const SlideOver = ({ open, onClose, title, children, width = 'max-w-lg' }) => {
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-40 bg-black/30" onClick={onClose}>
      <div onClick={e => e.stopPropagation()}
        className={cls('absolute right-0 top-0 h-full w-full surface border-l border-soft slide-over-enter overflow-auto scrollbar-thin', width)}>
        <div className="flex items-center justify-between px-5 py-3 border-b border-soft sticky top-0 surface z-10">
          <h3 className="text-sm font-semibold">{title}</h3>
          <button onClick={onClose} className="text-ink-500 hover:text-ink-900"><Icon name="x" size={16} /></button>
        </div>
        <div className="p-5">{children}</div>
      </div>
    </div>
  );
};

const EmptyState = ({ icon = 'inbox', title, message, action }) => (
  <div className="flex flex-col items-center justify-center py-12 text-center">
    <div className="w-12 h-12 rounded-full bg-ink-100 flex items-center justify-center text-ink-500 mb-3">
      <Icon name={icon} size={20} />
    </div>
    <div className="text-sm font-semibold mb-1">{title}</div>
    <div className="text-xs text-ink-500 max-w-sm mb-4">{message}</div>
    {action}
  </div>
);

const Sparkline = ({ data, color = 'var(--accent)', width = 80, height = 24 }) => {
  if (!data || data.length < 2) return null;
  const min = Math.min(...data), max = Math.max(...data);
  const span = max - min || 1;
  const pts = data.map((v, i) => `${(i/(data.length-1))*width},${height - ((v-min)/span)*height}`).join(' ');
  return (
    <svg width={width} height={height}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
};

const TrendArrow = ({ delta, suffix = '%' }) => {
  if (delta == null) return null;
  const up = delta >= 0;
  return (
    <span className={cls('inline-flex items-center gap-0.5 text-[11px] font-medium', up ? 'text-emerald-600' : 'text-red-600')}>
      <Icon name={up ? 'trending-up' : 'trending-down'} size={12} />
      {Math.abs(delta).toFixed(1)}{suffix}
    </span>
  );
};

const ScoreBadge = ({ score }) => {
  const tone = score >= 85 ? 'ok' : score >= 70 ? 'warn' : 'danger';
  const label = score >= 85 ? 'Green' : score >= 70 ? 'Amber' : 'Red';
  return <Pill tone={tone}>{score} · {label}</Pill>;
};

const RowActions = ({ onEdit, onArchive }) => (
  <div className="flex items-center gap-1 justify-end">
    {onEdit     && <button onClick={onEdit}    className="p-1 rounded hover:bg-ink-100 text-ink-500 hover:text-ink-900" title="Edit"><Icon name="pencil" size={14} /></button>}
    {onArchive  && <button onClick={onArchive} className="p-1 rounded hover:bg-ink-100 text-ink-500 hover:text-red-600"  title="Archive"><Icon name="archive" size={14} /></button>}
  </div>
);

Object.assign(window, {
  cls, Avatar, Pill, StatusPill, ProgressBar, Card, SectionTitle, Button, TextField, Select,
  Tabs, Modal, SlideOver, EmptyState, Sparkline, TrendArrow, ScoreBadge, RowActions,
});

</script>
<script type="text/babel">
// Round 2 store extensions — composed with the base store
// Returns extra state slices + actions; merged into useStore() value

function useStoreR2(base) {
  const [escalations, setEscalations]       = React.useState(() => ESCALATIONS_DEFAULT);
  const [stageStatuses, setStageStatuses]   = React.useState(() => STAGE_STATUSES_DEFAULT);
  const [lifecycleStages, setLifecycleStages] = React.useState(() => LIFECYCLE_STAGES_DEFAULT);
  const [customFields, setCustomFields]     = React.useState(() => CUSTOM_FIELDS_DEFAULT);
  const [milestoneTemplates, setMTemplates] = React.useState(() => MILESTONE_TEMPLATES_DEFAULT);
  const [milestoneEntries, setMEntries]     = React.useState(() => MILESTONE_ENTRIES_DEFAULT);
  const [financialEntries, setFinancialEntries] = React.useState(() => FINANCIAL_ENTRIES_DEFAULT);
  const [recycleBin, setRecycleBin]         = React.useState(() => []);
  const [stageHistory, setStageHistory]     = React.useState(() => ({})); // { 'schoolId-stageIdx': [{who,when,from,to,reason}] }
  const [materials, setMaterials]           = React.useState(() => MATERIALS);
  const [contractorsLocal, setContractorsLocal] = React.useState(() => CONTRACTORS);

  // ---- Escalations ----
  const addEscalation = (data) => {
    const id = `esc${Date.now()}`;
    const e = {
      id, status: 'Open', currentlyWith: 'u13', toUserId: 'u13', toRole: 'VP / Executive',
      opened: new Date().toISOString().slice(0, 10), daysOpen: 0,
      history: [{ who: data.fromUserId, when: new Date().toISOString().slice(0, 10), action: 'Created', note: data.reason }],
      ...data,
    };
    setEscalations(es => [e, ...es]);
    base.pushNotif({ kind: 'overdue', text: `New escalation: ${data.title}`, target: { kind: 'escalation', id } });
    return e;
  };
  const addEscalationComment = (id, who, note) => {
    setEscalations(es => es.map(e => e.id === id
      ? { ...e, history: [...e.history, { who, when: new Date().toISOString().slice(0, 10), action: 'Comment', note }] }
      : e));
  };
  const resolveEscalation = (id, who, note) => {
    setEscalations(es => es.map(e => e.id === id
      ? { ...e, status: 'Resolved', currentlyWith: null, resolvedDate: new Date().toISOString().slice(0, 10),
          history: [...e.history, { who, when: new Date().toISOString().slice(0, 10), action: 'Resolved', note }] }
      : e));
  };

  // ---- Stage flexible status ----
  const setSchoolStageStatus = (schoolId, stageIdx, statusId, who, reason) => {
    const status = stageStatuses.find(s => s.id === statusId);
    base.updateSchoolStage(schoolId, stageIdx, {
      done: status?.terminal || false,
      statusId,
      date: status?.terminal ? new Date().toISOString() : null,
      by: who,
    });
    const key = `${schoolId}-${stageIdx}`;
    setStageHistory(h => ({
      ...h,
      [key]: [...(h[key] || []), { who, when: new Date().toISOString(), to: statusId, reason: reason || '' }],
    }));
  };
  const addStageStatus = (s) => setStageStatuses(ss => [...ss, { id: `cs${Date.now()}`, builtin: false, terminal: false, color: '#64748B', ...s }]);
  const updateStageStatus = (id, patch) => setStageStatuses(ss => ss.map(s => s.id === id ? { ...s, ...patch } : s));
  const deleteStageStatus = (id) => setStageStatuses(ss => ss.filter(s => s.id !== id || s.builtin));

  // ---- Lifecycle CRUD ----
  const addLifecycleStage = (s) => setLifecycleStages(ls => [...ls, { id: `ls${Date.now()}`, order: ls.length, archived: false, color: '#13315C', criteria: '', ...s }]);
  const updateLifecycleStage = (id, patch) => setLifecycleStages(ls => ls.map(s => s.id === id ? { ...s, ...patch } : s));
  const deleteLifecycleStage = (id) => {
    const stage = lifecycleStages.find(s => s.id === id);
    if (!stage) return;
    setLifecycleStages(ls => ls.filter(s => s.id !== id));
    setRecycleBin(rb => [{ id: `rb${Date.now()}`, kind: 'lifecycle', label: stage.name, deletedAt: new Date().toISOString(), payload: stage }, ...rb]);
  };
  const reorderLifecycleStage = (id, dir) => setLifecycleStages(ls => {
    const sorted = [...ls].sort((a, b) => a.order - b.order);
    const i = sorted.findIndex(s => s.id === id);
    const j = i + dir;
    if (j < 0 || j >= sorted.length) return ls;
    [sorted[i].order, sorted[j].order] = [sorted[j].order, sorted[i].order];
    return [...sorted];
  });

  // ---- Custom fields CRUD ----
  const addCustomField = (entity, field) =>
    setCustomFields(cf => ({ ...cf, [entity]: [...(cf[entity] || []), { id: `cf-${Date.now()}`, ...field }] }));
  const updateCustomField = (entity, id, patch) =>
    setCustomFields(cf => ({ ...cf, [entity]: cf[entity].map(f => f.id === id ? { ...f, ...patch } : f) }));
  const deleteCustomField = (entity, id) =>
    setCustomFields(cf => ({ ...cf, [entity]: cf[entity].filter(f => f.id !== id) }));

  // ---- Milestone templates CRUD ----
  const addMilestoneTemplate = (mt) => setMTemplates(t => [...t, { id: `mt${Date.now()}`, weight: 25, fields: [], ...mt }]);
  const updateMilestoneTemplate = (id, patch) => setMTemplates(t => t.map(m => m.id === id ? { ...m, ...patch } : m));
  const deleteMilestoneTemplate = (id) => setMTemplates(t => t.filter(m => m.id !== id));
  const setMilestoneEntry = (contractorId, templateId, values) => {
    setMEntries(es => {
      const idx = es.findIndex(e => e.contractorId === contractorId && e.templateId === templateId);
      const entry = { id: idx >= 0 ? es[idx].id : `me-${contractorId}-${templateId}`, contractorId, templateId, values, when: new Date().toISOString().slice(0, 10) };
      return idx >= 0 ? es.map((e, i) => i === idx ? entry : e) : [...es, entry];
    });
  };
  // Auto-score derived from milestone entries
  const contractorScore = (contractorId) => {
    let total = 0, weightSum = 0;
    milestoneTemplates.forEach(mt => {
      const entry = milestoneEntries.find(e => e.contractorId === contractorId && e.templateId === mt.id);
      if (!entry) return;
      const scoreField = mt.fields.find(f => f.label.includes('Score'));
      const score = scoreField ? Number(entry.values[scoreField.id] || 0) : 75;
      total += score * mt.weight;
      weightSum += mt.weight;
    });
    return weightSum > 0 ? Math.round(total / weightSum) : 0;
  };

  // ---- Financial entries CRUD with auto-rollup ----
  const addFinancialEntry = (e) => setFinancialEntries(fe => [{ id: `fe${Date.now()}`, archived: false, document: null, ...e }, ...fe]);
  const updateFinancialEntry = (id, patch) => setFinancialEntries(fe => fe.map(e => e.id === id ? { ...e, ...patch } : e));
  const deleteFinancialEntry = (id) => {
    const entry = financialEntries.find(e => e.id === id);
    setFinancialEntries(fe => fe.filter(e => e.id !== id));
    if (entry) setRecycleBin(rb => [{ id: `rb${Date.now()}`, kind: 'finEntry', label: `${entry.type} · SAR ${SAR(entry.amount)}`, deletedAt: new Date().toISOString(), payload: entry }, ...rb]);
  };
  // Aggregations from entries
  const finRollup = (filterFn = () => true) => {
    const live = financialEntries.filter(e => !e.archived).filter(filterFn);
    const sum = (t) => live.filter(e => e.type === t).reduce((a, e) => a + e.amount, 0);
    return {
      receipts:    sum('Receipt'),
      receivables: sum('Receivable'),
      payments:    sum('Payment'),
      payables:    sum('Payable'),
      net:         sum('Receipt') - sum('Payment'),
    };
  };

  // ---- Schools CRUD ----
  const addSchool = (s) => {
    const id = `${s.projectId}-s${Date.now()}`;
    const school = {
      id, code: s.code, name: s.name, city: s.city, region: s.region || 'Riyadh', projectId: s.projectId,
      gender: s.gender || 'Boys', type: s.type || 'Primary',
      kw: s.kw || 100, contractor: s.contractor || null,
      address: s.address || s.city || '', remark: 'Active',
      stages: SCHOOL_STAGES.map(() => ({ done: false, date: null, by: null, statusId: 'not-started' })),
      issues: [], photos: {},
      lastUpdate: { by: null, when: null },
      customValues: s.customValues || {},
    };
    base._setSchools(ss => [school, ...ss]);
    return school;
  };
  const updateSchool = (id, patch) => base._setSchools(ss => ss.map(s => s.id === id ? { ...s, ...patch } : s));
  const deleteSchool = (id) => {
    const s = base.schools.find(x => x.id === id);
    base._setSchools(ss => ss.filter(x => x.id !== id));
    if (s) setRecycleBin(rb => [{ id: `rb${Date.now()}`, kind: 'school', label: `${s.code} · ${s.name}`, deletedAt: new Date().toISOString(), payload: s }, ...rb]);
  };

  // ---- Materials CRUD ----
  const addMaterial = (m) => setMaterials(ms => [{ id: `m${Date.now()}`, fix: 'Fix1', planned: 0, ordered: 0, dWh: 0, dSite: 0, installed: 0, status: 'Planning', archived: false, customValues: {}, ...m }, ...ms]);
  const updateMaterial = (id, patch) => setMaterials(ms => ms.map(m => m.id === id ? { ...m, ...patch } : m));
  const deleteMaterial = (id) => {
    const m = materials.find(x => x.id === id);
    setMaterials(ms => ms.filter(x => x.id !== id));
    if (m) setRecycleBin(rb => [{ id: `rb${Date.now()}`, kind: 'material', label: m.item, deletedAt: new Date().toISOString(), payload: m }, ...rb]);
  };

  // ---- Recycle Bin restore ----
  const restoreFromBin = (id) => {
    const item = recycleBin.find(r => r.id === id);
    if (!item) return;
    if (item.kind === 'lifecycle') setLifecycleStages(ls => [...ls, item.payload]);
    if (item.kind === 'school')    base._setSchools(ss => [item.payload, ...ss]);
    if (item.kind === 'material')  setMaterials(ms => [item.payload, ...ms]);
    if (item.kind === 'finEntry')  setFinancialEntries(fe => [item.payload, ...fe]);
    setRecycleBin(rb => rb.filter(r => r.id !== id));
  };

<script type="text/babel">
// Central reactive store using React Context.
// All cross-cutting state (schools, tasks, chats, notifications) lives here.

const StoreCtx = React.createContext(null);

function StoreProvider({ children }) {
  const [schools, setSchools]     = React.useState(() => ALL_SCHOOLS);
  const [tasks, setTasks]         = React.useState(() => TASKS);
  const [chats, setChats]         = React.useState(() => PRE_CHATS);
  const [notifs, setNotifs]       = React.useState(() => SAMPLE_NOTIFS);
  const [people]                  = React.useState(() => PEOPLE);
  const [projects, setProjects]   = React.useState(() => PROJECTS);

  // ----- Tasks -----
  const addTask = (t) => {
    const id = `t${Date.now()}`;
    const task = {
      id,
      title: t.title || 'Untitled task',
      description: t.description || '',
      assigneeId: t.assigneeId,
      createdById: t.createdById || 'u1',
      createdAt: new Date().toISOString().slice(0, 10),
      due: t.due,
      priority: t.priority || 'Medium',
      status: 'Open',
      projectId: t.projectId || null,
      schoolId: t.schoolId || null,
      stageIndex: t.stageIndex == null ? null : t.stageIndex,
      messages: [],
    };
    setTasks(ts => [task, ...ts]);
    // Notify assignee
    if (task.assigneeId) {
      pushNotif({
        kind: 'task',
        text: `New task assigned: ${task.title}`,
        target: { kind: 'task', id },
      });
    }
    return task;
  };

  const updateTask = (id, patch) => {
    setTasks(ts => ts.map(t => t.id === id ? { ...t, ...patch } : t));
  };

  const sendTaskMessage = (taskId, msg) => {
    setTasks(ts => ts.map(t => t.id === taskId
      ? { ...t, messages: [...t.messages, { id: `tm${Date.now()}`, ...msg, when: new Date().toISOString() }] }
      : t));
    const task = tasks.find(t => t.id === taskId);
    if (task && task.assigneeId !== msg.userId) {
      pushNotif({ kind: 'reminder', text: `Message on task: ${task.title}`, target: { kind: 'task', id: taskId } });
    }
  };

  const sendTaskReminder = (taskId) => {
    const task = tasks.find(t => t.id === taskId);
    if (!task) return;
    pushNotif({
      kind: 'reminder',
      text: `Reminder: ${task.title}`,
      target: { kind: 'task', id: taskId },
    });
  };

  // ----- Chats -----
  const sendChatMessage = (schoolId, msg) => {
    setChats(c => ({
      ...c,
      [schoolId]: [...(c[schoolId] || []), {
        id: `m${Date.now()}`,
        userId: msg.userId,
        text: msg.text,
        when: new Date().toISOString(),
        mentions: msg.mentions || [],
      }],
    }));
    // Mention notifications
    (msg.mentions || []).forEach(uid => {
      const sender = people.find(p => p.id === msg.userId);
      pushNotif({
        kind: 'mention',
        text: `${sender?.name || 'Someone'} mentioned you in a school chat`,
        target: { kind: 'school', id: schoolId },
      });
    });
  };

  // ----- Schools -----
  const updateSchoolStage = (schoolId, stageIndex, payload) => {
    setSchools(ss => ss.map(s => {
      if (s.id !== schoolId) return s;
      const stages = s.stages.slice();
      stages[stageIndex] = { ...stages[stageIndex], ...payload };
      const lastUpdate = { by: payload.by, when: payload.date };
      return { ...s, stages, lastUpdate };
    }));
    pushNotif({
      kind: 'stage',
      text: `Stage "${SCHOOL_STAGES[stageIndex]}" updated for school`,
      target: { kind: 'school', id: schoolId },
    });
  };

  const updateSchoolRemark = (schoolId, remark) => {
    setSchools(ss => ss.map(s => s.id === schoolId ? { ...s, remark } : s));
  };

  const addSchoolPhoto = (schoolId, stageIndex, label) => {
    setSchools(ss => ss.map(s => {
      if (s.id !== schoolId) return s;
      const photos = { ...s.photos };
      photos[stageIndex] = [...(photos[stageIndex] || []), { id: `ph${Date.now()}`, label, when: new Date().toISOString() }];
      return { ...s, photos };
    }));
  };

  // ----- Notifications -----
  const pushNotif = (n) => {
    setNotifs(ns => [{
      id: `n${Date.now()}-${Math.floor(Math.random() * 1000)}`,
      when: 'just now',
      read: false,
      ...n,
    }, ...ns]);
  };

  const markNotifRead = (id) => {
    setNotifs(ns => ns.map(n => n.id === id ? { ...n, read: true } : n));
  };

  const markAllNotifsRead = () => {
    setNotifs(ns => ns.map(n => ({ ...n, read: true })));
  };

  const baseValue = {
    schools, tasks, chats, notifs, people, projects,
    addTask, updateTask, sendTaskMessage, sendTaskReminder,
    sendChatMessage,
    updateSchoolStage, updateSchoolRemark, addSchoolPhoto,
    pushNotif, markNotifRead, markAllNotifsRead,
    _setSchools: setSchools,
  };
  const r2 = (typeof useStoreR2 === 'function') ? useStoreR2(baseValue) : {};
  const value = { ...baseValue, ...r2 };
  return <StoreCtx.Provider value={value}>{children}</StoreCtx.Provider>;
}

const useStore = () => React.useContext(StoreCtx);

// Helpers
const getPerson = (id) => PEOPLE.find(p => p.id === id);
const getProject = (id) => PROJECTS.find(p => p.id === id);
const isOverdue = (dueIso) => {
  const today = new Date('2026-05-04').getTime();
  return new Date(dueIso).getTime() < today;
};
const todayIso = () => '2026-05-04';

Object.assign(window, { StoreProvider, StoreCtx, useStore, getPerson, getProject, isOverdue, todayIso });

</script>
<script type="text/babel">
// School chat panel with @mentions
function ChatPanel({ schoolId, messages, currentUserId, onSend }) {
  const [text, setText] = React.useState('');
  const [showPicker, setShowPicker] = React.useState(false);
  const [pickerQ, setPickerQ] = React.useState('');
  const inputRef = React.useRef(null);
  const scrollRef = React.useRef(null);

  React.useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages?.length]);

  const onChange = (v) => {
    setText(v);
    const at = v.lastIndexOf('@');
    if (at >= 0 && (at === 0 || /\s/.test(v[at - 1]))) {
      const after = v.slice(at + 1);
      if (!/\s/.test(after)) {
        setShowPicker(true);
        setPickerQ(after);
        return;
      }
    }
    setShowPicker(false);
  };

  const insertMention = (user) => {
    const at = text.lastIndexOf('@');
    const newText = text.slice(0, at) + `@${user.id} `;
    setText(newText);
    setShowPicker(false);
    inputRef.current?.focus();
  };

  const send = () => {
    if (!text.trim()) return;
    const mentions = [...text.matchAll(/@(u\d+)/g)].map(m => m[1]);
    onSend({ userId: currentUserId, text, mentions });
    setText('');
  };

  const renderText = (str) => {
    const parts = str.split(/(@u\d+)/g);
    return parts.map((p, i) => {
      const m = p.match(/^@(u\d+)$/);
      if (m) {
        const u = getPerson(m[1]);
        return <span key={i} className="text-accent font-medium bg-accent-soft px-1 rounded">@{u?.name?.split(' ')[0] || m[1]}</span>;
      }
      return <span key={i}>{p}</span>;
    });
  };

  const filteredPeople = PEOPLE.filter(p =>
    !pickerQ || p.name.toLowerCase().includes(pickerQ.toLowerCase()) || p.role.toLowerCase().includes(pickerQ.toLowerCase())
  ).slice(0, 6);

  return (
    <div className="flex flex-col h-full">
      <div ref={scrollRef} className="flex-1 overflow-y-auto p-3 space-y-3 surface-2 scrollbar-thin">
        {(!messages || messages.length === 0) && (
          <div className="text-center text-xs text-ink-500 py-8">
            <Icon name="mail" size={24} className="mx-auto mb-2 opacity-40" />
            No messages yet. Start the conversation — type @ to mention someone.
          </div>
        )}
        {(messages || []).map(m => {
          const u = getPerson(m.userId);
          const isMe = m.userId === currentUserId;
          return (
            <div key={m.id} className={cls('flex gap-2', isMe && 'flex-row-reverse')}>
              <Avatar initials={u?.initials || '??'} size={28} />
              <div className={cls('max-w-[75%]', isMe && 'text-right')}>
                <div className="text-[10px] text-ink-500 mb-0.5">
                  <span className="font-semibold text-ink-700">{u?.name}</span> · {u?.role}
                </div>
                <div className={cls('text-xs px-3 py-2 rounded-lg inline-block text-left',
                  isMe ? 'bg-navy-900 text-white' : 'bg-white border border-ink-200')}>
                  {renderText(m.text)}
                </div>
                <div className="text-[10px] text-ink-500 mt-0.5">{new Date(m.when).toLocaleString('en-GB', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: 'short' })}</div>
              </div>
            </div>
          );
        })}
      </div>

      <div className="relative border-t border-soft p-2 surface">
        {showPicker && (
          <div className="absolute bottom-full left-2 mb-1 surface border border-soft rounded-md shadow-pop overflow-hidden w-72 z-20">
            <div className="text-[10px] uppercase tracking-wider text-ink-500 px-3 py-1.5 bg-ink-50 border-b border-soft">Mention someone</div>
            {filteredPeople.map(u => (
              <button key={u.id} onClick={() => insertMention(u)}
                className="w-full text-left flex items-center gap-2 px-3 py-1.5 hover:bg-ink-50 text-xs">
                <Avatar initials={u.initials} size={22} />
                <div>
                  <div className="font-medium">{u.name}</div>
                  <div className="text-[10px] text-ink-500">{u.role}</div>
                </div>
              </button>
            ))}
          </div>
        )}
        <div className="flex gap-2">
          <input ref={inputRef} value={text} onChange={e => onChange(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
            placeholder="Type message — use @ to mention…"
            className="flex-1 px-3 py-2 text-sm rounded-md border border-ink-200 bg-white focus:outline-none focus:ring-2 ring-accent" />
          <Button variant="accent" icon="check" onClick={send}>Send</Button>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { ChatPanel });

</script>

}

function NotifPanel({ open, onClose, items, onNavigate, onMarkAllRead }) {
  const tones   = { task: 'info', overdue: 'danger', mention: 'gold', reminder: 'warn', stage: 'navy', pay: 'ok', ncr: 'warn' };
  const icons   = { task: 'check-circle', overdue: 'alert-circle', mention: 'mail', reminder: 'bell', stage: 'milestone', pay: 'banknote', ncr: 'alert-circle' };
  return (
    <SlideOver open={open} onClose={onClose} title="Notifications" width="max-w-sm">
      <div className="flex justify-between items-center mb-3">
        <span className="text-xs text-ink-500">{items.filter(n => !n.read).length} unread of {items.length}</span>
        <Button size="sm" variant="ghost" onClick={onMarkAllRead}>Mark all read</Button>
      </div>
      <div className="space-y-2">
        {items.map(n => (
          <button key={n.id} onClick={() => onNavigate(n)}
            className={cls('w-full text-left p-3 rounded-md border transition',
              n.read ? 'border-soft bg-white' : 'border-accent bg-accent-soft')}>
            <div className="flex items-start gap-2">
              <Pill tone={tones[n.kind] || 'soft'}><Icon name={icons[n.kind] || 'bell'} size={11} /></Pill>
              <div className="flex-1 min-w-0">
                <div className="text-xs">{n.text}</div>
                <div className="text-[10px] text-ink-500 mt-0.5">{n.when} · click to open</div>
              </div>
              {!n.read && <span className="w-2 h-2 rounded-full bg-accent mt-1.5" />}
            </div>
          </button>
        ))}
        {items.length === 0 && <div className="text-xs text-ink-500 italic text-center py-6">No notifications.</div>}
      </div>
    </SlideOver>
  );
}

Object.assign(window, { Sidebar, TopBar, NotifPanel, navForRole });

</script>
<script type="text/babel">
// Page 1 — Main Dashboard

const KPICard = ({ label, value, trend, spark, accent, suffix }) => (
  <div className="surface border border-soft rounded-xl p-4 shadow-card relative overflow-hidden">
    <div className="absolute left-0 top-0 bottom-0 w-1" style={{ background: accent ? 'var(--accent)' : '#0B2545' }} />
    <div className="text-[10px] font-semibold uppercase tracking-wider text-ink-500 ink-muted-on-dark">{label}</div>
    <div className="flex items-end justify-between mt-1.5">
      <div className="text-[26px] font-bold leading-none text-navy-900 ink-on-dark tnum">{value}<span className="text-sm font-medium text-ink-500 ml-1">{suffix}</span></div>
      {trend != null && <TrendArrow delta={trend} />}
    </div>
    {spark && <div className="mt-2"><Sparkline data={spark} width={140} height={26} /></div>}
  </div>
);

function StageStrip({ counts, onClickStage, activeStage }) {
  const max = Math.max(...counts, 1);
  return (
    <div className="grid grid-cols-12 gap-1.5">
      {SCHOOL_STAGES.map((s, i) => {
        const c = counts[i] || 0;
        const h = 28 + (c / max) * 36;
        const isHandover = i === SCHOOL_STAGES.length - 1;
        const isActive = activeStage === i;
        return (
          <button key={s} onClick={() => onClickStage(i)}
            className={cls('stage-pill text-left rounded-md p-2 border transition',
              isActive ? 'border-accent bg-accent-soft' : 'border-soft hover:border-navy-800')}>
            <div className="flex items-end h-12 mb-1">
              <div className="w-full rounded-t-sm" style={{
                height: h,
                background: isHandover ? '#C8102E' : (i < 4 ? '#13315C' : i < 8 ? '#2A5A9A' : '#B8860B'),
                opacity: c === 0 ? 0.25 : 1
              }} />
            </div>
            <div className="text-[10px] text-ink-500 ink-muted-on-dark leading-tight">{i+1}. {s}</div>
            <div className="text-[15px] font-bold text-navy-900 ink-on-dark tnum">{c}</div>
          </button>
        );
      })}
    </div>
  );
}

function ProjectCard({ p, onOpen }) {
  const pm = PEOPLE.find(u => u.id === p.pmId);
  const typeChips = { 'School Program': 'navy', 'University': 'info', 'Building': 'soft', 'Area': 'gold' };
  return (
    <button onClick={() => onOpen(p.id)}
      className="text-left surface border border-soft rounded-xl p-4 shadow-card hover:shadow-pop transition w-full">
      <div className="flex items-start justify-between gap-2 mb-2">
        <div className="min-w-0">
          <div className="text-[14px] font-semibold leading-tight ink-on-dark">{p.name}</div>
          <div className="text-[11px] text-ink-500 ink-muted-on-dark mt-0.5 flex items-center gap-1.5">
            <Icon name="map-pin" size={11} /> {p.region} · {p.city}
          </div>
        </div>
        <Pill tone={typeChips[p.type] || 'soft'}>{p.type}</Pill>
      </div>

      <div className="grid grid-cols-2 gap-2 text-xs my-3">
        <div>
          <div className="text-ink-500 ink-muted-on-dark text-[10px] uppercase tracking-wider">Contract</div>
          <div className="font-semibold tnum">SAR {SAR(p.value)}</div>
        </div>
        {p.sites > 1 && (
          <div>
            <div className="text-ink-500 ink-muted-on-dark text-[10px] uppercase tracking-wider">Schools</div>
            <div className="font-semibold tnum">{p.sites}</div>
          </div>
        )}
        <div>
          <div className="text-ink-500 ink-muted-on-dark text-[10px] uppercase tracking-wider">Start</div>
          <div className="tnum">{p.start}</div>
        </div>
        <div>
          <div className="text-ink-500 ink-muted-on-dark text-[10px] uppercase tracking-wider">Target</div>
          <div className="tnum">{p.target}</div>
        </div>
      </div>

      <div className="mb-2.5">
        <div className="flex items-center justify-between text-[11px] mb-1">
          <span className="text-ink-500 ink-muted-on-dark">Overall progress</span>
          <span className="font-semibold tnum">{p.progress}%</span>
        </div>
        <ProgressBar value={p.progress} color="#0B2545" />
      </div>

      <div className="flex items-center justify-between">
        <StatusPill status={p.status} />
        <div className="flex items-center gap-1.5">
          <Avatar initials={pm.initials} size={20} />
          <span className="text-[11px] text-ink-700 ink-on-dark">{pm.name.split(' ')[0]}</span>
        </div>
      </div>
    </button>
  );
}

function PageDashboard({ projects, onOpenProject }) {
  const [stageFilter, setStageFilter] = React.useState(null);

  const totalValue = projects.reduce((a, p) => a + p.value, 0);
  const openCount = projects.filter(p => p.progress < 100).length;
  const closedCount = projects.length - openCount;
  const totalSchools = projects.filter(p => p.schoolDist).reduce((a,p)=>a+p.sites,0);
  const energizedSchools = projects.filter(p => p.schoolDist).reduce((a,p)=>a + p.schoolDist.slice(8).reduce((x,y)=>x+y,0), 0);
  const overall = Math.round(projects.reduce((a,p)=>a+p.progress,0) / projects.length);

  const stageCounts = SCHOOL_STAGES.map((_, i) =>
    projects.filter(p => p.schoolDist).reduce((a, p) => a + (p.schoolDist[i] || 0), 0)
  );

  const filteredProjects = stageFilter == null
    ? projects
    : projects.filter(p => p.schoolDist && p.schoolDist[stageFilter] > 0);

  const kpis = [
    { label: 'Total Programs Value', value: SAR(totalValue), suffix: 'SAR', trend: 4.2, spark: [200,260,290,310,320,360,380,400,420,440,460,totalValue/1e7] },
    { label: 'Total Projects',       value: projects.length, trend: 0, spark: [4,5,6,7,7,7,7,8,8,8,8,projects.length] },
    { label: 'Open Projects',        value: openCount, trend: -8.0, spark: [9,9,9,8,8,8,7,7,7,7,8,openCount] },
    { label: 'Closed / Handed Over', value: closedCount, trend: 12.5, spark: [0,0,0,1,1,1,2,2,2,2,2,closedCount] },
    { label: 'Total Schools',        value: totalSchools.toLocaleString(), trend: 0, spark: [400,600,800,1000,1000,1000,1000,1000,1000,1000,1000,totalSchools] },
    { label: 'Schools Energized',    value: energizedSchools.toLocaleString(), trend: 18.4, spark: [20,40,80,140,200,280,360,420,500,560,620,energizedSchools] },
    { label: 'Overall Progress',     value: overall, suffix: '%', trend: 6.1, spark: [12,18,24,28,32,36,40,44,48,52,56,overall] },
  ];

  return (
    <div className="p-6 space-y-6">
      {/* KPI strip */}
      <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-7 gap-3">
        {kpis.map((k, i) => <KPICard key={i} {...k} accent={i === 0 || i === 6} />)}
      </div>

      {/* Stage strip */}
      <Card>
        <SectionTitle
          icon="bar-chart-3"
          title="School Program Execution Stages — Across All Programs"
          subtitle="Click any stage to filter the project grid below"
          action={stageFilter != null && <Button variant="ghost" size="sm" icon="x" onClick={() => setStageFilter(null)}>Clear filter</Button>}
        />
        <StageStrip counts={stageCounts} onClickStage={setStageFilter} activeStage={stageFilter} />
        <div className="mt-3 flex items-center gap-4 text-[11px] text-ink-500 ink-muted-on-dark">
          <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-sm bg-navy-800" /> Pre-construction</span>
          <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-sm" style={{background:'#2A5A9A'}} /> Materials & Install</span>
          <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-sm bg-gold" /> Commissioning</span>
          <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-sm bg-ind-red" /> Handover to Client</span>
        </div>
      </Card>

      {/* Project grid */}
      <div>
        <SectionTitle
          icon="folder-kanban"
          title={stageFilter != null ? `Projects with schools at "${SCHOOL_STAGES[stageFilter]}"` : 'All Projects'}
          subtitle={`${filteredProjects.length} of ${projects.length} projects`}
          action={<Button icon="plus" variant="accent" onClick={() => alert('New project — Use Settings → Projects to add')}>New Project</Button>}
        />
        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-3">
          {filteredProjects.map(p => <ProjectCard key={p.id} p={p} onOpen={onOpenProject} />)}
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { PageDashboard });

</script>
<script type="text/babel">
// Page 2 — Project Detail

function ProjectTimeline({ currentStage, onClickStage }) {
  return (
    <div className="overflow-x-auto scrollbar-thin">
      <div className="flex items-center gap-0 min-w-[1100px] py-4">
        {PROJECT_STAGES.map((s, i) => {
          const done = i < currentStage;
          const current = i === currentStage;
          const future = i > currentStage;
          return (
            <React.Fragment key={s.name}>
              <button onClick={() => onClickStage(i)} className="flex flex-col items-center text-center px-1 group" style={{ minWidth: 80 }}>
                <div className={cls('w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold border-2 transition group-hover:scale-110',
                  done ? 'bg-navy-900 border-navy-900 text-white' :
                  current ? 'bg-gold border-gold text-white' :
                  'bg-white border-ink-200 text-ink-500')}>
                  {done ? <Icon name="check" size={14} /> : (i+1)}
                </div>
                <div className={cls('mt-1.5 text-[10px] leading-tight w-20',
                  done ? 'text-navy-900 font-medium ink-on-dark' :
                  current ? 'text-gold font-semibold' :
                  'text-ink-500 ink-muted-on-dark')}>
                  {s.name}
                </div>
              </button>
              {i < PROJECT_STAGES.length - 1 && (
                <div className={cls('h-0.5 flex-1 -mt-7', done ? 'bg-navy-900' : current ? 'bg-gradient-to-r from-gold to-ink-200' : 'bg-ink-200')} style={{ minWidth: 24 }} />
              )}
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );
}

function StageDetailPanel({ stage, stageIdx, project, onClose }) {
  if (!stage) return null;
  const subtasks = stage.sub.map((name, i) => {
    const owner = PEOPLE[(stageIdx + i) % PEOPLE.length];
    const days = (i === 0 && stageIdx === project.currentStage) ? 8 : Math.max(1, ((stageIdx + i) * 3) % 12);
    const status = i === 0 && stageIdx === project.currentStage ? 'In Progress' : (stageIdx < project.currentStage ? 'Done' : 'Pending');
    return { name, owner, days, status };
  });
  return (
    <SlideOver open={!!stage} onClose={onClose} title={`Stage ${stageIdx + 1}: ${stage.name}`} width="max-w-xl">
      <div className="space-y-4">
        <div className="surface-2 rounded-md p-3 border border-soft">
          <div className="text-[11px] text-ink-500 ink-muted-on-dark">Project</div>
          <div className="text-sm font-semibold ink-on-dark">{project.name}</div>
        </div>

        <div>
          <div className="text-[11px] uppercase tracking-wider text-ink-500 ink-muted-on-dark mb-2">Internal sub-tasks</div>
          <div className="space-y-2">
            {subtasks.map((t, i) => (
              <div key={i} className="border border-soft rounded-md p-3">
                <div className="flex items-start justify-between gap-2 mb-2">
                  <div className="text-sm font-medium ink-on-dark">{t.name}</div>
                  <Pill tone={t.status === 'Done' ? 'ok' : t.status === 'In Progress' ? 'gold' : 'soft'}>{t.status}</Pill>
                </div>
                <div className="flex items-center justify-between text-xs">
                  <div className="flex items-center gap-2">
                    <Avatar initials={t.owner.initials} size={22} />
                    <span className="ink-on-dark">{t.owner.name}</span>
                    <span className="text-ink-500 ink-muted-on-dark">· {t.owner.role}</span>
                  </div>
                  <div className={cls('flex items-center gap-1 text-[11px]', t.days > 7 ? 'text-red-600 font-semibold' : 'text-ink-500 ink-muted-on-dark')}>
                    <Icon name="clock" size={12} />
                    {t.days}d {t.days > 7 && '· Bottleneck'}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>

        <div>
          <div className="text-[11px] uppercase tracking-wider text-ink-500 ink-muted-on-dark mb-2">Handoff history</div>
          <div className="space-y-2">
            {[
              { who: PEOPLE[1], when: '2026-04-22', dur: '3d', note: 'Drafted initial submission' },
              { who: PEOPLE[2], when: '2026-04-25', dur: '2d', note: 'Internal QA review' },
              { who: PEOPLE[6], when: '2026-04-27', dur: '4d', note: 'Submitted to authority' },
            ].map((h, i) => (
              <div key={i} className="flex items-start gap-2 text-xs">
                <Avatar initials={h.who.initials} size={20} />
                <div className="flex-1">
                  <div><span className="font-medium ink-on-dark">{h.who.name}</span> <span className="text-ink-500 ink-muted-on-dark">held for {h.dur}</span></div>
                  <div className="text-ink-500 ink-muted-on-dark">{h.note} · {h.when}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </SlideOver>
  );
}

function PageProject({ project, onBack, onOpenSchools, onAddTask, onOpenTask, onEscalate }) {
  const [openStage, setOpenStage] = React.useState(null);
  const [tab, setTab] = React.useState('Overview');
  const store = (typeof useStore === 'function') ? useStore() : null;
  const projTasks = store ? store.tasks.filter(t => t.projectId === project.id) : [];
  const pm = PEOPLE.find(u => u.id === project.pmId);
  const TABS = ['Overview', project.schoolDist ? 'Schools' : 'Sites', 'Tasks', 'Materials', 'Financials', 'Contractors'];

  return (
    <div className="p-6 space-y-5">
      <div className="flex items-center justify-between">
        <button onClick={onBack} className="text-xs text-ink-500 hover:text-ink-900 inline-flex items-center gap-1">
          <Icon name="arrow-left" size={12} /> Back
        </button>
        <div className="flex gap-2">
          {project.schoolDist && <Button variant="outline" icon="school" onClick={() => onOpenSchools && onOpenSchools(project.id)}>View all 200 schools</Button>}
          {onEscalate && <Button variant="outline" icon="alert-circle" onClick={onEscalate}>Escalate to VP</Button>}
          <Button variant="accent" icon="plus" onClick={() => onAddTask && onAddTask({ projectId: project.id })}>Add task</Button>
        </div>
      </div>

      <div className="flex items-start justify-between gap-4">
        <div>
          <div className="flex items-center gap-2 text-xs text-ink-500 ink-muted-on-dark">
            <Icon name="map-pin" size={11} /> {project.region} · {project.city}
            <Pill tone="soft">{project.type}</Pill>
          </div>
          <h1 className="text-2xl font-bold mt-1 ink-on-dark">{project.name}</h1>
          <div className="flex items-center gap-3 mt-2">
            <StatusPill status={project.status} />
            <span className="text-xs text-ink-500 ink-muted-on-dark">Contract: <span className="font-semibold ink-on-dark tnum">SAR {SAR(project.value)}</span></span>
            <span className="text-xs text-ink-500 ink-muted-on-dark">PM: <span className="font-semibold ink-on-dark">{pm.name}</span></span>
          </div>
        </div>
        <div className="text-right">
          <div className="text-[11px] text-ink-500 ink-muted-on-dark">Overall</div>
          <div className="text-3xl font-bold tnum text-navy-900 ink-on-dark">{project.progress}%</div>
        </div>
      </div>

      {/* Project lifecycle timeline */}
      <Card>
        <SectionTitle icon="git-branch" title="Project Execution Lifecycle" subtitle="Click any stage to inspect sub-tasks, owners, and history" />
        <ProjectTimeline currentStage={project.currentStage} onClickStage={i => setOpenStage(i)} />
      </Card>

      {/* School stages strip (or milestones for non-school) */}
      {project.schoolDist ? (
        <Card>
          <SectionTitle icon="school" title={`School Execution Stages — ${project.sites} schools`} />
          <div className="grid grid-cols-12 gap-1.5">
            {SCHOOL_STAGES.map((s, i) => {
              const c = project.schoolDist[i] || 0;
              const max = Math.max(...project.schoolDist);
              return (
                <div key={s} className="border border-soft rounded-md p-2">
                  <div className="flex items-end h-10 mb-1">
                    <div className="w-full rounded-t-sm" style={{
                      height: 16 + (c / max) * 30,
                      background: i === SCHOOL_STAGES.length - 1 ? '#C8102E' : i < 4 ? '#13315C' : i < 8 ? '#2A5A9A' : '#B8860B',
                      opacity: c === 0 ? 0.25 : 1,
                    }} />
                  </div>
                  <div className="text-[10px] text-ink-500 ink-muted-on-dark leading-tight">{i+1}. {s}</div>
                  <div className="text-[14px] font-bold tnum ink-on-dark">{c}</div>
                </div>
              );
            })}
          </div>
        </Card>
      ) : (
        <Card>
          <SectionTitle icon="milestone" title="Site Milestones" />
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
            {['Site Survey','Civil Works','Mechanical Install','Electrical Install','Commissioning','Energization','COC','Handover'].map((m, i) => (
              <div key={m} className="border border-soft rounded-md p-3">
                <Pill tone={i < 4 ? 'ok' : i === 4 ? 'gold' : 'soft'}>{i < 4 ? 'Done' : i === 4 ? 'In Progress' : 'Planned'}</Pill>
                <div className="text-sm font-semibold mt-1.5 ink-on-dark">{m}</div>
                <div className="text-[10px] text-ink-500 ink-muted-on-dark mt-0.5">Target: 2026-{String(i+5).padStart(2,'0')}-15</div>
              </div>
            ))}

        </Card>
