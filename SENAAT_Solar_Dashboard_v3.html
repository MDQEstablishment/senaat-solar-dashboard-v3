// School name generator
function genSchoolName(i) {
  var np = NAME_PARTS[i % NAME_PARTS.length];
  var lvl = STAGES_LEVELS[(i >> 2) % 2];
  var tier = STAGE_TIERS[(i >> 1) % 3];
  return "".concat(np, " ").concat(lvl, " ").concat(tier);
}
function genSchoolCode(progIdx, schoolIdx) {
  var region = (PROGRAMS[progIdx].region.match(/\b\w/g) || ["X"]).join("").toUpperCase().slice(0, 2);
  return "".concat(region, "-").concat(String(schoolIdx + 1).padStart(3, "0"));
}

// Generate stage progress for one school
function genSchoolStages(seed) {
  // Deterministic-ish based on seed
  var out = {};
  // Decide bucket: 30% all done, 50% partial, 20% partial-with-remark
  var bucket = seed % 10;
  var allDone = bucket < 3;
  var withRemark = bucket >= 8;
  var progress = allDone ? 12 : 3 + seed * 7 % 9; // 3..11
  STAGES.forEach((s, idx) => {
    var done = idx < progress;
    var month = (seed + idx) % 8 + 1;
    var day = (seed * 3 + idx * 5) % 27 + 1;
    out[s.id] = {
      done,
      date: done ? "2026-".concat(String(month).padStart(2, "0"), "-").concat(String(day).padStart(2, "0")) : null,
      status: done ? "Done" : idx === progress ? seed % 13 === 0 ? "Blocked" : "In Progress" : "Not Started",
      by: done ? EMPLOYEES[(seed + idx) % EMPLOYEES.length].name : null
    };
  });
  return {
    stages: out,
    remark: withRemark ? REMARKS[1 + seed % 5] : "",
    lastUpdate: "2026-04-".concat(String(seed % 28 + 1).padStart(2, "0")),
    lastBy: EMPLOYEES[seed % EMPLOYEES.length].name
  };
}
