// School name generator
function genSchoolName(i) {
  const np = NAME_PARTS[i % NAME_PARTS.length];
  const lvl = STAGES_LEVELS[(i >> 2) % 2];
  const tier = STAGE_TIERS[(i >> 1) % 3];
  return `${np} ${lvl} ${tier}`;
}

function genSchoolCode(progIdx, schoolIdx) {
  const region = (PROGRAMS[progIdx].region.match(/\b\w/g) || ["X"]).join("").toUpperCase().slice(0,2);
  return `${region}-${String(schoolIdx + 1).padStart(3,"0")}`;
}

// Generate stage progress for one school
function genSchoolStages(seed) {
  // Deterministic-ish based on seed
  const out = {};
  // Decide bucket: 30% all done, 50% partial, 20% partial-with-remark
  const bucket = seed % 10;
  let allDone = bucket < 3;
  let withRemark = bucket >= 8;
  let progress = allDone ? 12 : (3 + ((seed * 7) % 9)); // 3..11
  STAGES.forEach((s, idx) => {
    const done = idx < progress;
    const month = ((seed + idx) % 8) + 1;
    const day = ((seed * 3 + idx * 5) % 27) + 1;
    out[s.id] = {
      done,
      date: done ? `2026-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}` : null,
      status: done ? "Done" : (idx === progress ? (((seed % 13) === 0) ? "Blocked" : "In Progress") : "Not Started"),
      by: done ? EMPLOYEES[(seed + idx) % EMPLOYEES.length].name : null
    };
  });
  return { stages: out, remark: withRemark ? REMARKS[1 + (seed % 5)] : "", lastUpdate: `2026-04-${String((seed % 28) + 1).padStart(2,"0")}`, lastBy: EMPLOYEES[seed % EMPLOYEES.length].name };
}

// 1600 schools
function genAllSchools() {
  const arr = [];
  PROGRAMS.forEach((p, pi) => {
    for (let i = 0; i < 200; i++) {
      const seed = pi * 200 + i;
      const sd = genSchoolStages(seed);
      arr.push({
        id: `${p.id}-S${i+1}`,
        programId: p.id,
        code: genSchoolCode(pi, i),
        name: genSchoolName(seed),
        city: CITIES[seed % CITIES.length],
        contractor: CONTRACTORS[seed % CONTRACTORS.length].name,
        kw: 100 + ((seed * 13) % 400),
        meter: `MTR-${10000 + seed}`,
        address: `${(seed % 99) + 1} District ${(seed % 12) + 1}, ${CITIES[seed % CITIES.length]}`,
        ...sd,
        deleted: false
      });
    }
  });
  return arr;
}

  ];
  const out = [];
  for (let i = 0; i < 28; i++) {
    const offset = (i % 3 === 0) ? -((i % 5) + 1) : (i % 7) + 1;
    const due = new Date(Date.now() + offset * 86400000);
    out.push({
      id: "T" + (i + 1),

      description: "Auto-generated demo task. Coordinate with relevant parties and update status.",

      schoolId: i % 3 === 0 ? null : `${PROGRAMS[i % 8].id}-S${(i % 50) + 1}`,
      stageId: i % 4 === 0 ? null : STAGES[i % 12].id,
      projectId: PROGRAMS[i % 8].id,
      status: ["Open","In Progress","Done"][i % 3],
      deleted:false
    });
  }
  return out;
}

const initial = {
  role: "VP",
  route: { page:"dashboard" }, // {page, params...}
  programs: PROGRAMS,
  schools: genAllSchools(),
  employees: EMPLOYEES,

  milestoneTemplates: MILESTONE_TEMPLATES_INITIAL,
  contractorScores: CONTRACTOR_SCORES_INITIAL,
  customFields: CUSTOM_FIELDS_INITIAL,
  toasts: []
};

function reducer(s, a) {
  switch (a.type) {
    case "ROLE":     return { ...s, role:a.role, route:{ page:"dashboard" } };
    case "ROUTE":    return { ...s, route:a.route };
    case "TOAST":    return { ...s, toasts:[...s.toasts, { id:Date.now()+Math.random(), text:a.text }] };
    case "TOAST_RM": return { ...s, toasts:s.toasts.filter(t => t.id !== a.id) };
    case "ADD_TASK": return { ...s, tasks:[...s.tasks, a.task] };
    case "UPD_TASK": return { ...s, tasks:s.tasks.map(t => t.id === a.task.id ? a.task : t) };
    case "DEL_TASK": return { ...s, tasks:s.tasks.map(t => t.id === a.id ? { ...t, deleted:true } : t) };
    case "RES_TASK": return { ...s, tasks:s.tasks.map(t => t.id === a.id ? { ...t, deleted:false } : t) };
    case "ADD_SCHOOL": return { ...s, schools:[...s.schools, a.school] };
    case "UPD_SCHOOL": return { ...s, schools:s.schools.map(x => x.id === a.school.id ? a.school : x) };
    case "DEL_SCHOOL": return { ...s, schools:s.schools.map(x => x.id === a.id ? { ...x, deleted:true } : x) };
    case "RES_SCHOOL": return { ...s, schools:s.schools.map(x => x.id === a.id ? { ...x, deleted:false } : x) };
    case "ADD_MAT":  return { ...s, materials:[...s.materials, a.m] };
    case "UPD_MAT":  return { ...s, materials:s.materials.map(x => x.id === a.m.id ? a.m : x) };
    case "DEL_MAT":  return { ...s, materials:s.materials.map(x => x.id === a.id ? { ...x, deleted:true } : x) };
    case "RES_MAT":  return { ...s, materials:s.materials.map(x => x.id === a.id ? { ...x, deleted:false } : x) };
    case "ADD_FIN":  return { ...s, financials:[...s.financials, a.f] };
    case "UPD_FIN":  return { ...s, financials:s.financials.map(x => x.id === a.f.id ? a.f : x) };
    case "DEL_FIN":  return { ...s, financials:s.financials.map(x => x.id === a.id ? { ...x, deleted:true } : x) };
    case "RES_FIN":  return { ...s, financials:s.financials.map(x => x.id === a.id ? { ...x, deleted:false } : x) };
    case "ADD_STAGE": return { ...s, stages:[...s.stages, a.stage] };
    case "UPD_STAGE": return { ...s, stages:s.stages.map(x => x.id === a.stage.id ? a.stage : x) };
    case "DEL_STAGE": return { ...s, stages:s.stages.map(x => x.id === a.id ? { ...x, deleted:true } : x) };
    case "RES_STAGE": return { ...s, stages:s.stages.map(x => x.id === a.id ? { ...x, deleted:false } : x) };
    case "REORDER_STAGE": {
      const stages = [...s.stages];
      const idx = stages.findIndex(x => x.id === a.id);
      const swap = a.dir === "up" ? idx - 1 : idx + 1;
      if (swap < 0 || swap >= stages.length) return s;
      [stages[idx], stages[swap]] = [stages[swap], stages[idx]];
      stages.forEach((st, i) => st.order = i + 1);
      return { ...s, stages };
    }
    case "ADD_STATUS": return { ...s, statuses:[...s.statuses, a.st] };
    case "UPD_STATUS": return { ...s, statuses:s.statuses.map(x => x.id === a.st.id ? a.st : x) };
    case "DEL_STATUS": return { ...s, statuses:s.statuses.map(x => x.id === a.id ? { ...x, deleted:true } : x) };
    case "RES_STATUS": return { ...s, statuses:s.statuses.map(x => x.id === a.id ? { ...x, deleted:false } : x) };
    case "ADD_CF":  return { ...s, customFields:{ ...s.customFields, [a.entity]:[...(s.customFields[a.entity] || []), a.f] } };
    case "DEL_CF":  return { ...s, customFields:{ ...s.customFields, [a.entity]:(s.customFields[a.entity] || []).map(f => f.id === a.id ? { ...f, deleted:true } : f) } };
    case "RES_CF":  return { ...s, customFields:{ ...s.customFields, [a.entity]:(s.customFields[a.entity] || []).map(f => f.id === a.id ? { ...f, deleted:false } : f) } };
    case "ADD_MT":  return { ...s, milestoneTemplates:[...s.milestoneTemplates, a.t] };
    case "UPD_MT":  return { ...s, milestoneTemplates:s.milestoneTemplates.map(x => x.id === a.t.id ? a.t : x) };
    case "DEL_MT":  return { ...s, milestoneTemplates:s.milestoneTemplates.map(x => x.id === a.id ? { ...x, deleted:true } : x) };
    case "RES_MT":  return { ...s, milestoneTemplates:s.milestoneTemplates.map(x => x.id === a.id ? { ...x, deleted:false } : x) };
    case "ADD_ESC":   return { ...s, escalations:[a.esc, ...s.escalations] };
    case "UPD_ESC":   return { ...s, escalations:s.escalations.map(e => e.id === a.esc.id ? a.esc : e) };
    case "ADD_CHAT": {
      const arr = s.chats[a.schoolId] || [];
      return { ...s, chats:{ ...s.chats, [a.schoolId]:[...arr, a.msg] } };
    }
    case "ADD_NOTIF": return { ...s, notifications:[a.n, ...s.notifications] };
    case "MARK_NOTIF_READ": return { ...s, notifications:s.notifications.map(n => n.id === a.id ? { ...n, read:true } : n) };
    default: return s;
  }
}

function StoreProvider({ children }) {
  const [state, dispatch] = useReducer(reducer, initial);
  const value = useMemo(() => ({ state, dispatch }), [state]);
  return <StoreCtx.Provider value={value}>{children}</StoreCtx.Provider>;
}
function useStore() { return useContext(StoreCtx); }

/* ============================================================
   FINANCIAL DERIVATION
   ============================================================ */
function deriveFinancials(financials, programs) {
  const live = financials.filter(f => !f.deleted);
  const totalContract = programs.reduce((a,b) => a + b.contract, 0);
  const totalInvoiced = live.filter(f => f.type === "Invoice").reduce((a,b) => a + b.amount, 0);
  const totalReceivable = live.filter(f => f.type === "Receivable").reduce((a,b) => a + b.amount, 0);
  const totalPayable = live.filter(f => f.type === "Payable").reduce((a,b) => a + b.amount, 0);
  const totalPaid = live.filter(f => f.type === "Payment").reduce((a,b) => a + b.amount, 0);
  return { totalContract, totalInvoiced, totalReceivable, totalPayable, totalPaid, live };
}

                const updated = { ...esc, history:[...esc.history, { by:"E1", text:comment, at:new Date().toISOString().slice(0,10) }] };

                const updated = { ...esc, state:"Resolved", history:[...esc.history, { by:"E1", text:"Resolved by VP.", at:new Date().toISOString().slice(0,10) }], waitingOn:"-", days:0 };

function PmDashboard() {
  const { state, dispatch } = useStore();

  const myEsc = state.escalations.filter(e => e.raisedBy === "E2");
  const live = state.schools.filter(s => !s.deleted);
  const myTasks = state.tasks.filter(t => !t.deleted && t.assignee === "E2");
  const overdue = myTasks.filter(t => new Date(t.due) < new Date() && t.status !== "Done");

  // contractor performance
  const scores = state.contractorScores.map(cs => {
    const total = cs.entries.reduce((sum, e) => {
      const tpl = state.milestoneTemplates.find(m => m.id === e.templateId);
      return sum + (tpl ? (e.value * tpl.weight / 100) : 0);
    }, 0);
    return { name: state.contractors.find(c => c.id === cs.contractor)?.name, score: Math.round(total) };
  });

  return (
    <div className="p-6 space-y-6">
      <div>

        <Kpi label="Active Schools"   value={fmtNum(live.length)} accent="navy" />
        <Kpi label="My Tasks"          value={myTasks.length} sub={`${overdue.length} overdue`} sublabel="" accent={overdue.length>0?"red":"navy"} />
        <Kpi label="My Escalations"    value={myEsc.length} sub={`${myEsc.filter(e=>e.state==="Open").length} open`} accent="amber" />
        <Kpi label="Paid YTD"          value={fmtSAR(fin.totalPaid)} accent="green" />

      <div className="grid lg:grid-cols-2 gap-6">

          <div className="space-y-3">
            {scores.map(s => (
              <div key={s.name}>
                <div className="flex justify-between text-sm mb-1"><span className="font-medium">{s.name}</span><span className="font-semibold">{s.score}</span></div>
                <div className="h-2 bg-slate-100 rounded-full"><div className="h-full bg-amber-500 rounded-full" style={{ width: s.score + "%" }}/></div>
              </div>
            ))}
          </div>
        </Card>

          <div className="space-y-2">

              <div key={esc.id} className="flex items-center justify-between border-b py-2 last:border-0">
                <div>
                  <div className="font-medium text-sm">{esc.title}</div>

                <Pill color={esc.state==="Open"?"red":"green"}>{esc.state}</Pill>

            ))}

        </Card>

      <Card title="Portfolio Trend">
        <ResponsiveContainer width="100%" height={240}>
          <AreaChart data={[

function TaskForm({ open, onClose, onSave, prefill }) {
  const { state } = useStore();
  const [t, setT] = useState({
    title:"", description:"", assignee:"E2", due:new Date(Date.now()+86400000*3).toISOString().slice(0,10),
    priority:"Medium", schoolId:null, stageId:null, projectId:"P1", status:"Open", ...prefill
  });
  useEffect(() => { setT(prev => ({ ...prev, ...prefill })); }, [open]);
  return (
    <Modal open={open} onClose={onClose} title="Add Task">
      <div className="space-y-3">
        <Field label="Title"><Input value={t.title} onChange={e => setT({ ...t, title:e.target.value })}/></Field>
        <Field label="Description"><Textarea value={t.description} onChange={e => setT({ ...t, description:e.target.value })} rows={2}/></Field>
        <div className="grid grid-cols-2 gap-3">
          <Field label="Assignee">
            <Select value={t.assignee} onChange={e => setT({ ...t, assignee:e.target.value })}>
              {state.employees.map(em => <option key={em.id} value={em.id}>{em.name}</option>)}
            </Select>
          </Field>
          <Field label="Due"><Input type="date" value={t.due} onChange={e => setT({ ...t, due:e.target.value })}/></Field>
          <Field label="Priority">
            <Select value={t.priority} onChange={e => setT({ ...t, priority:e.target.value })}>{["Low","Medium","High","Critical"].map(p=><option key={p}>{p}</option>)}</Select>
          </Field>
          <Field label="Project">
            <Select value={t.projectId} onChange={e => setT({ ...t, projectId:e.target.value })}>
              {state.programs.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
            </Select>
          </Field>
          <Field label="Linked Stage (optional)">
            <Select value={t.stageId || ""} onChange={e => setT({ ...t, stageId: e.target.value || null })}>
              <option value="">—</option>
              {state.stages.filter(s => !s.deleted).map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
            </Select>
          </Field>
          <Field label="Linked School (optional)"><Input value={t.schoolId || ""} onChange={e => setT({ ...t, schoolId: e.target.value || null })} placeholder="School ID"/></Field>
        </div>
        <div className="flex justify-end gap-2 pt-2">
          <Btn variant="secondary" onClick={onClose}>Cancel</Btn>
          <Btn onClick={() => { onSave({ ...t, id:"T" + Date.now(), deleted:false }); onClose(); }}>Save Task</Btn>
        </div>
      </div>
    </Modal>
  );
}

function MyTasks() {
  const { state, dispatch } = useStore();
  const [open, setOpen] = useState(false);
  const [side, setSide] = useState(null);
  const my = state.tasks.filter(t => !t.deleted && t.assignee === "E2");
  const today = new Date(); today.setHours(0,0,0,0);

  return (
    <div className="p-6 space-y-4">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-bold text-slate-900">My Tasks</h1>
        <Btn onClick={() => setOpen(true)}>{I.plus} Add Task</Btn>
      </div>

      <Card>
        <table className="w-full text-sm">
          <thead className="text-xs text-slate-500 uppercase">
            <tr><th className="text-left py-2">Title</th><th>Due</th><th>Priority</th><th>Status</th><th></th></tr>
          </thead>
          <tbody>
            {my.map(t => {
              const due = new Date(t.due);
              const overdue = due < today && t.status !== "Done";
              return (
                <tr key={t.id} className={`border-t hover:bg-slate-50 cursor-pointer ${overdue?"bg-red-50":""}`} onClick={() => setSide(t)}>
                  <td className="py-3"><span className={overdue?"text-red-700 font-medium":"font-medium"}>{t.title}</span></td>
                  <td>{t.due}</td>
                  <td><Pill color={t.priority==="Critical"?"red":t.priority==="High"?"amber":"slate"}>{t.priority}</Pill></td>
                  <td><Pill color={t.status==="Done"?"green":t.status==="In Progress"?"blue":"slate"}>{t.status}</Pill></td>
                  <td className="text-right"><Btn size="sm" variant="ghost">{I.arrowR}</Btn></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card>

      <TaskForm open={open} onClose={() => setOpen(false)} onSave={t => { dispatch({ type:"ADD_TASK", task:t }); dispatch({ type:"TOAST", text:"Task added" }); }} />
      {side && (
        <TaskSidePanel t={side} onClose={() => setSide(null)} />
      )}
    </div>
  );
}

  const { state, dispatch } = useStore();
  return (
    <div className="fixed inset-0 z-30 bg-black/30 flex justify-end" onClick={onClose}>

        <div className="flex items-center justify-between">

function SchoolsList() {
  const { state, dispatch } = useStore();
  const projectId = state.route.projectId || "P1";
  const program = state.programs.find(p => p.id === projectId);
  const allLive = state.schools.filter(s => !s.deleted && s.programId === projectId);

  const [search, setSearch] = useState("");
  const [filterStage, setFilterStage] = useState("");
  const [filterRemark, setFilterRemark] = useState("");
  const [filterCity, setFilterCity] = useState("");
  const [page, setPage] = useState(1);
  const [addOpen, setAddOpen] = useState(false);
  const [importOpen, setImportOpen] = useState(false);
  const [editing, setEditing] = useState(null);
  const PER_PAGE = 25;

  const filtered = allLive.filter(s => {
    if (search && !s.name.toLowerCase().includes(search.toLowerCase()) && !s.code.toLowerCase().includes(search.toLowerCase())) return false;
    if (filterStage && !s.stages[filterStage]?.done) return false;
    if (filterRemark && s.remark !== filterRemark) return false;
    if (filterCity && s.city !== filterCity) return false;
    return true;
  });

  const totalPages = Math.max(1, Math.ceil(filtered.length / PER_PAGE));
  const visible = filtered.slice((page-1)*PER_PAGE, page*PER_PAGE);

  function exportCSV() {
    const rows = [["Code","Name","City","Contractor","kW","Remark","LastUpdate", ...state.stages.filter(s=>!s.deleted).map(s=>s.name)]];
    filtered.forEach(s => {
      rows.push([s.code, s.name, s.city, s.contractor, s.kw, s.remark, s.lastUpdate, ...state.stages.filter(st=>!st.deleted).map(st => s.stages[st.id]?.done ? s.stages[st.id].date : "")]);
    });
    const csv = rows.map(r => r.map(x => `"${(x||"").toString().replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob = new Blob([csv], { type:"text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `schools_${program.region}.csv`; a.click();
    URL.revokeObjectURL(url);
    dispatch({ type:"TOAST", text:"CSV exported" });
  }

  return (
    <div className="p-6 space-y-4">
      <div className="flex flex-wrap items-center justify-between gap-2">
        <div>
          <h1 className="text-2xl font-bold text-slate-900">Schools — {program.name}</h1>
          <p className="text-sm text-slate-500">{filtered.length} of {allLive.length} schools</p>
        </div>
        <div className="flex flex-wrap gap-2">
          <Btn variant="secondary" onClick={exportCSV}>{I.download} Export Excel</Btn>
          <Btn variant="secondary" onClick={() => setImportOpen(true)}>{I.upload} Import Schools</Btn>
          <Btn onClick={() => setAddOpen(true)}>{I.plus} Add School</Btn>
        </div>
      </div>

      <Card>
        <div className="grid md:grid-cols-4 gap-3 mb-4">
          <div className="relative">
            <span className="absolute left-3 top-2.5 text-slate-400">{I.search}</span>
            <Input className="pl-9" placeholder="Search by name / code" value={search} onChange={e=>{setSearch(e.target.value); setPage(1);}}/>
          </div>
          <Select value={filterStage} onChange={e => { setFilterStage(e.target.value); setPage(1); }}>
            <option value="">All Stages</option>
            {state.stages.filter(s=>!s.deleted).map(s => <option key={s.id} value={s.id}>{s.name} done</option>)}
          </Select>
          <Select value={filterRemark} onChange={e => { setFilterRemark(e.target.value); setPage(1); }}>
            <option value="">All Remarks</option>
            {REMARKS.filter(r=>r).map(r => <option key={r}>{r}</option>)}
          </Select>
          <Select value={filterCity} onChange={e => { setFilterCity(e.target.value); setPage(1); }}>
            <option value="">All Cities</option>
            {[...new Set(allLive.map(s => s.city))].sort().map(c => <option key={c}>{c}</option>)}
          </Select>
        </div>

        <div className="overflow-x-auto scroll-thin">
          <table className="w-full text-xs">
            <thead className="bg-slate-50 text-slate-600 uppercase">
              <tr>
                <th className="text-left p-2">Code</th>
                <th className="text-left p-2">Name</th>
                <th className="text-left p-2">City</th>
                {state.stages.filter(s=>!s.deleted).map(s => (
                  <th key={s.id} className="text-center p-2 whitespace-nowrap" title={s.name}>{s.name.slice(0,3)}</th>
                ))}
                <th className="text-left p-2">Remark</th>
                <th className="text-left p-2">Last update</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {visible.map(s => (
                <tr key={s.id} className="border-t hover:bg-slate-50">
                  <td className="p-2 font-mono">{s.code}</td>
                  <td className="p-2 font-medium">
                    <button className="hover:text-amber-600 text-left" onClick={() => dispatch({ type:"ROUTE", route:{ page:"school", id:s.id, projectId } })}>{s.name}</button>
                  </td>
                  <td className="p-2">{s.city}</td>
                  {state.stages.filter(st=>!st.deleted).map(st => {
                    const sg = s.stages[st.id];
                    return (
                      <td key={st.id} className="p-2 text-center">
                        {sg?.done ? <div title={sg.date} className="text-emerald-600 font-bold">✓<div className="text-[9px] text-slate-400">{sg.date?.slice(5)}</div></div> : <span className="text-slate-300">—</span>}
                      </td>
                    );
                  })}
                  <td className="p-2">
                    <Select value={s.remark} onChange={e => dispatch({ type:"UPD_SCHOOL", school:{ ...s, remark:e.target.value } })} className="text-xs py-1">
                      <option value="">—</option>
                      {REMARKS.filter(r=>r).map(r => <option key={r}>{r}</option>)}
                    </Select>
                  </td>
                  <td className="p-2 whitespace-nowrap text-slate-500">{s.lastUpdate}</td>
                  <td className="p-2 whitespace-nowrap">
                    <button onClick={() => setEditing(s)} className="text-slate-500 hover:text-amber-600 mr-1">{I.edit}</button>
                    <button onClick={() => { dispatch({ type:"DEL_SCHOOL", id:s.id }); dispatch({ type:"TOAST", text:"School moved to Recycle Bin" }); }} className="text-slate-500 hover:text-red-600">{I.bin}</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <div className="flex items-center justify-between pt-3 text-sm text-slate-600">
          <div>Page {page} of {totalPages}</div>
          <div className="flex gap-2">
            <Btn size="sm" variant="secondary" onClick={() => setPage(p => Math.max(1, p-1))}>{I.arrowL} Prev</Btn>
            <Btn size="sm" variant="secondary" onClick={() => setPage(p => Math.min(totalPages, p+1))}>Next {I.arrowR}</Btn>
          </div>
        </div>
      </Card>

      <SchoolForm open={addOpen} onClose={() => setAddOpen(false)} programId={projectId} />
      <SchoolForm open={!!editing} onClose={() => setEditing(null)} programId={projectId} school={editing} />
      <ImportModal open={importOpen} onClose={() => setImportOpen(false)} entity="Schools" templateCols={["Code","Name","City","Contractor","kW","Address"]} />
    </div>
  );
}

function SchoolForm({ open, onClose, programId, school }) {
  const { state, dispatch } = useStore();
  const cf = (state.customFields.Schools || []).filter(f => !f.deleted);
  const [s, setS] = useState({ code:"", name:"", city:"Riyadh", contractor: state.contractors[0].name, kw:200, address:"", custom:{} });
  useEffect(() => {
    if (school) setS({ ...school, custom: school.custom || {} });
    else setS({ code:"", name:"", city:"Riyadh", contractor: state.contractors[0].name, kw:200, address:"", custom:{} });
  }, [open, school]);

  return (
    <Modal open={open} onClose={onClose} title={school?"Edit School":"Add School"}>
      <div className="space-y-3">
        <div className="grid grid-cols-2 gap-3">
          <Field label="Code"><Input value={s.code} onChange={e=>setS({ ...s, code:e.target.value })}/></Field>
          <Field label="City">
            <Select value={s.city} onChange={e=>setS({ ...s, city:e.target.value })}>{CITIES.map(c=><option key={c}>{c}</option>)}</Select>
          </Field>
        </div>
        <Field label="Name"><Input value={s.name} onChange={e=>setS({ ...s, name:e.target.value })}/></Field>
        <Field label="Address"><Input value={s.address} onChange={e=>setS({ ...s, address:e.target.value })}/></Field>
        <div className="grid grid-cols-2 gap-3">
          <Field label="Contractor">
            <Select value={s.contractor} onChange={e=>setS({ ...s, contractor:e.target.value })}>{state.contractors.map(c=><option key={c.id}>{c.name}</option>)}</Select>
          </Field>
          <Field label="kW size"><Input type="number" value={s.kw} onChange={e=>setS({ ...s, kw:Number(e.target.value) })}/></Field>
        </div>

        {cf.length > 0 && (
          <div className="border-t pt-3">
            <div className="text-xs text-slate-500 font-medium mb-2">Custom Fields</div>
            {cf.map(f => (
              <Field key={f.id} label={f.label}>
                {f.type === "dropdown"
                  ? <Select value={s.custom[f.id]||""} onChange={e=>setS({ ...s, custom:{ ...s.custom, [f.id]:e.target.value } })}>
                      <option value="">—</option>
                      {(f.options||[]).map(o=><option key={o}>{o}</option>)}
                    </Select>
                  : <Input type={f.type==="number"?"number":f.type==="date"?"date":"text"} value={s.custom[f.id]||""} onChange={e=>setS({ ...s, custom:{ ...s.custom, [f.id]:e.target.value } })}/>}
              </Field>
            ))}
          </div>
        )}

        <div className="flex justify-end gap-2 pt-2">
          <Btn variant="secondary" onClick={onClose}>Cancel</Btn>
          <Btn onClick={() => {
            if (school) {
              dispatch({ type:"UPD_SCHOOL", school:{ ...school, ...s } });
              dispatch({ type:"TOAST", text:"School updated" });
            } else {
              const stages = {};
              state.stages.forEach(st => { stages[st.id] = { done:false, date:null, status:"Not Started", by:null }; });
              dispatch({ type:"ADD_SCHOOL", school:{ id:"NEW-"+Date.now(), programId, ...s, stages, remark:"", lastUpdate:new Date().toISOString().slice(0,10), lastBy:"Salem Al-Otaibi", deleted:false } });
              dispatch({ type:"TOAST", text:"School added" });
            }
            onClose();
          }}>Save</Btn>
        </div>
      </div>
    </Modal>
  );
}

function ImportModal({ open, onClose, entity, templateCols }) {
  const { dispatch } = useStore();
  function downloadTemplate() {
    const rows = [templateCols, templateCols.map(_ => "")];
    const csv = rows.map(r => r.join(",")).join("\n");
    const blob = new Blob([csv], { type:"text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `${entity}_template.csv`; a.click();
    URL.revokeObjectURL(url);
    dispatch({ type:"TOAST", text:"Template downloaded" });
  }
  return (
    <Modal open={open} onClose={onClose} title={`Import ${entity}`}>
      <div className="space-y-3 text-sm">
        <p className="text-slate-600">Use the template to bulk-import. Real Excel parsing is out of scope for this prototype.</p>
        <div className="flex gap-2">
          <Btn variant="secondary" onClick={downloadTemplate}>{I.download} Download Template</Btn>
          <Btn onClick={() => { dispatch({ type:"TOAST", text:"Import simulated successfully" }); onClose(); }}>{I.upload} Upload File</Btn>
        </div>
        <div className="border-t pt-3 text-xs text-slate-500">
          Template columns: {templateCols.join(" · ")}
        </div>
      </div>
    </Modal>
  );
}

function SchoolDetail() {

  );

function FinancialForm({ open, onClose, entry }) {

          <Field label="Date"><Input type="date" value={f.date} onChange={e=>setF({ ...f, date:e.target.value })}/></Field>
          <Field label="Stage / Milestone"><Select value={f.stageId||""} onChange={e=>setF({ ...f, stageId:e.target.value })}><option value="">—</option>{state.stages.filter(s=>!s.deleted).map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</Select></Field>

            onClose();
          }}>Save</Btn>
        </div>
      </div>
    </Modal>
  );
}

   CONTRACTORS
   ============================================================ */
function ContractorsPage() {
  const { state, dispatch } = useStore();
  const [openId, setOpenId] = useState(null);
  const scoreFor = (cid) => {
    const cs = state.contractorScores.find(s => s.contractor === cid);
    if (!cs) return 0;
    return Math.round(cs.entries.reduce((sum, e) => {
      const tpl = state.milestoneTemplates.find(m => m.id === e.templateId);
      return sum + (tpl ? e.value * tpl.weight / 100 : 0);
    }, 0));
  };

  if (openId) {
    const c = state.contractors.find(x => x.id === openId);
    const cs = state.contractorScores.find(s => s.contractor === openId);
    return (
      <div className="p-6 space-y-4">
        <button onClick={() => setOpenId(null)} className="text-sm text-slate-500 flex items-center gap-1">{I.arrowL} Back</button>
        <Card title={c.name} action={<Pill color="amber">Score {scoreFor(openId)}</Pill>}>
          <div className="text-sm text-slate-500 mb-2">CR: {c.cr}</div>
        </Card>
        <Card title="Milestone entries" action={<Btn size="sm" onClick={() => dispatch({ type:"TOAST", text:"Milestone entry recorded — financial entry auto-created" })}>{I.plus} Add Payment</Btn>}>
          <table className="w-full text-sm">
            <thead className="text-xs text-slate-500 uppercase"><tr><th className="text-left py-2">Milestone</th><th>Weight</th><th className="text-right">Value</th><th className="text-right">Contribution</th></tr></thead>
            <tbody>
              {cs.entries.map((e, i) => {
                const tpl = state.milestoneTemplates.find(m => m.id === e.templateId);
                return (
                  <tr key={i} className="border-t">
                    <td className="py-2 font-medium">{tpl?.name}</td>
                    <td>{tpl?.weight}%</td>
                    <td className="text-right">{e.value}</td>
                    <td className="text-right font-semibold">{Math.round(e.value * (tpl?.weight||0) / 100)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </Card>
      </div>
    );
  }

  return (
    <div className="p-6 space-y-4">
      <h1 className="text-2xl font-bold text-slate-900">Contractors</h1>
      <Card>
        <table className="w-full text-sm">
          <thead className="text-xs text-slate-500 uppercase"><tr><th className="text-left py-2">Name</th><th>CR</th><th>Score</th><th></th></tr></thead>
          <tbody>
            {state.contractors.map(c => (
              <tr key={c.id} className="border-t hover:bg-slate-50">
                <td className="py-2 font-medium">{c.name}</td>
                <td>{c.cr}</td>
                <td>
                  <div className="flex items-center gap-2">
                    <div className="w-32 h-2 bg-slate-100 rounded"><div className="h-full bg-amber-500 rounded" style={{ width: scoreFor(c.id)+"%" }}/></div>
                    <span className="font-semibold">{scoreFor(c.id)}</span>
                  </div>
                </td>
                <td className="text-right"><Btn size="sm" variant="secondary" onClick={() => setOpenId(c.id)}>Open</Btn></td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

            <Pill color="slate">{f.type}</Pill>
            {f.options && <span className="text-xs text-slate-500">{(f.options||[]).join(" · ")}</span>}
            <button onClick={() => { dispatch({ type:"DEL_CF", entity, id:f.id }); dispatch({ type:"TOAST", text:"Field removed" }); }} className="text-slate-500 hover:text-red-600">{I.bin}</button>
          </div>
        ))}
      </div>
      <div className="border-t pt-3">
        <div className="font-semibold text-sm mb-2">Add Field</div>
        <div className="grid grid-cols-3 gap-2 items-end">
          <Field label="Label"><Input value={v.label} onChange={e=>setV({ ...v, label:e.target.value })}/></Field>
          <Field label="Type"><Select value={v.type} onChange={e=>setV({ ...v, type:e.target.value })}>{["text","number","date","dropdown","file"].map(t=><option key={t}>{t}</option>)}</Select></Field>
          {v.type === "dropdown" && <Field label="Options (comma-sep)"><Input value={v.options} onChange={e=>setV({ ...v, options:e.target.value })}/></Field>}
        </div>
        <Btn className="mt-3" onClick={() => {
          if (!v.label) return;
          const f = { id:"CF"+Date.now(), label:v.label, type:v.type, deleted:false };
          if (v.type === "dropdown" && v.options) f.options = v.options.split(",").map(x => x.trim()).filter(Boolean);
          dispatch({ type:"ADD_CF", entity, f });
          dispatch({ type:"TOAST", text:`Field added to ${entity}` });
          setV({ label:"", type:"text", options:"" });
        }}>{I.plus} Add Field</Btn>
      </div>
    </Card>
  );
}

function MilestoneTemplateSettings() {
  const { state, dispatch } = useStore();
  const [open, setOpen] = useState(false);
  const [v, setV] = useState({ name:"", weight:25, fields:[{ label:"", type:"amount" }] });
  const live = state.milestoneTemplates.filter(t => !t.deleted);
  return (
    <Card title={`Milestone Templates (${live.length})`} action={<Btn size="sm" onClick={() => { setV({ name:"", weight:25, fields:[{ label:"", type:"amount" }] }); setOpen(true); }}>{I.plus} Add Template</Btn>}>
      <div className="space-y-2">
        {live.map(t => (
          <div key={t.id} className="border rounded-lg p-3">
            <div className="flex items-center justify-between mb-1">
              <div className="font-semibold">{t.name}</div>
              <div className="flex items-center gap-2"><Pill color="amber">Weight {t.weight}%</Pill>
                <button onClick={() => { dispatch({ type:"DEL_MT", id:t.id }); dispatch({ type:"TOAST", text:"Template removed" }); }} className="text-slate-500 hover:text-red-600">{I.bin}</button>
              </div>
            </div>
            <div className="text-xs text-slate-500">Fields: {t.fields.map(f => `${f.label} (${f.type})`).join(" · ")}</div>
          </div>
        ))}
      </div>
      <Modal open={open} onClose={() => setOpen(false)} title="Add Milestone Template">
        <div className="space-y-3">
          <Field label="Name"><Input value={v.name} onChange={e=>setV({ ...v, name:e.target.value })}/></Field>
          <Field label="Weight (%)"><Input type="number" value={v.weight} onChange={e=>setV({ ...v, weight:Number(e.target.value) })}/></Field>
          <div className="border-t pt-2">
            <div className="text-xs font-medium text-slate-600 mb-2">Fields</div>
            {v.fields.map((f, i) => (
              <div key={i} className="grid grid-cols-3 gap-2 mb-2">
                <Input placeholder="Label" value={f.label} onChange={e => { const x=[...v.fields]; x[i].label=e.target.value; setV({ ...v, fields:x }); }}/>
                <Select value={f.type} onChange={e => { const x=[...v.fields]; x[i].type=e.target.value; setV({ ...v, fields:x }); }}>{["amount","date","document","dropdown","text"].map(t=><option key={t}>{t}</option>)}</Select>
                <Btn variant="secondary" size="sm" onClick={() => setV({ ...v, fields:v.fields.filter((_,k)=>k!==i) })}>{I.x}</Btn>
              </div>
            ))}
            <Btn size="sm" variant="secondary" onClick={() => setV({ ...v, fields:[...v.fields, { label:"", type:"amount" }] })}>{I.plus} Add Field</Btn>
          </div>
          <div className="flex justify-end gap-2"><Btn variant="secondary" onClick={() => setOpen(false)}>Cancel</Btn><Btn onClick={() => {
            if (!v.name) return;
            dispatch({ type:"ADD_MT", t:{ id:"MT"+Date.now(), ...v, fields:v.fields.map((f,i) => ({ id:"f"+i, ...f })), deleted:false } });
            dispatch({ type:"TOAST", text:"Template added" });
            setOpen(false);
          }}>Save</Btn></div>
        </div>
      </Modal>
    </Card>
  );
}

/* ============================================================
   RECYCLE BIN
   ============================================================ */
function RecycleBin() {
  const { state, dispatch } = useStore();
  const groups = [
    { label:"Schools",          items:state.schools.filter(x=>x.deleted),         restore:id => dispatch({ type:"RES_SCHOOL", id }) },
    { label:"Materials",        items:state.materials.filter(x=>x.deleted),       restore:id => dispatch({ type:"RES_MAT", id }) },
    { label:"Stages",           items:state.stages.filter(x=>x.deleted),          restore:id => dispatch({ type:"RES_STAGE", id }) },
    { label:"Statuses",         items:state.statuses.filter(x=>x.deleted),        restore:id => dispatch({ type:"RES_STATUS", id }) },
    { label:"Tasks",            items:state.tasks.filter(x=>x.deleted),           restore:id => dispatch({ type:"RES_TASK", id }) },
    { label:"Financial Entries",items:state.financials.filter(x=>x.deleted),      restore:id => dispatch({ type:"RES_FIN", id }) },
    { label:"Milestone Templates",items:state.milestoneTemplates.filter(x=>x.deleted), restore:id => dispatch({ type:"RES_MT", id }) }
  ];
  return (
    <div className="p-6 space-y-4">
      <h1 className="text-2xl font-bold text-slate-900">Recycle Bin</h1>
      <p className="text-sm text-slate-500">Soft-deleted records grouped by entity. Restore or permanently delete.</p>
      {groups.map(g => g.items.length === 0 ? null : (
        <Card key={g.label} title={`${g.label} (${g.items.length})`}>
          <div className="space-y-1">
            {g.items.map(it => (
              <div key={it.id} className="flex items-center justify-between border-b last:border-0 py-2">
                <div className="text-sm">{it.name || it.title || it.code || it.label || it.id}</div>
                <div className="flex gap-2">
                  <Btn size="sm" variant="secondary" onClick={() => { g.restore(it.id); dispatch({ type:"TOAST", text:"Restored" }); }}>Restore</Btn>
                  <Btn size="sm" variant="danger" onClick={() => dispatch({ type:"TOAST", text:"Permanent delete simulated" })}>{I.bin} Permanent</Btn>
                </div>
              </div>
            ))}
          </div>
        </Card>
      ))}
      {groups.every(g => g.items.length === 0) && <Card><div className="text-sm text-slate-500 italic">Recycle Bin is empty.</div></Card>}
    </div>
  );
}

/* ============================================================
   ROUTER / MAIN
   ============================================================ */
function PageRouter() {
  const { state } = useStore();
  const role = state.role;
  const page = state.route.page;

  // Universal pages
  if (page === "settings") return <SettingsPage />;
  if (page === "recycle")  return <RecycleBin />;
  if (page === "tasks")    return <MyTasks />;
  if (page === "financials") return <FinancialsPage />;
  if (page === "materials")  return <MaterialsPage />;
  if (page === "contractors")return <ContractorsPage />;
  if (page === "reports")    return <ReportsPage />;

  if (role === "VP") {
    if (page === "dashboard")   return <VpDashboard />;
    if (page === "programs")    return <VpPrograms />;
    if (page === "escalations") return <VpEscalations />;
  }
  if (role === "Program Manager") {
    if (page === "dashboard")   return <PmDashboard />;
    if (page === "projects")    return <PmProjects />;
    if (page === "escalations") return <PmEscalations />;
  }
  if (role === "Project Manager") {
    if (page === "dashboard") return <PmgrDashboard />;
    if (page === "schools")   return <SchoolsList />;
    if (page === "school")    return <SchoolDetail />;
  }
  if (role === "Site Engineer") {
    if (page === "dashboard") return <SiteEngineerDashboard />;
  }
  return <div className="p-6">Page not found.</div>;
}

function App() {
  return (
    <StoreProvider>
      <div className="min-h-screen bg-slate-50">
        <Header />
        <div className="flex">
          <Sidebar />
          <main className="flex-1 min-w-0">
            <PageRouter />
          </main>
        </div>
        <Toasts />
      </div>
    </StoreProvider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
