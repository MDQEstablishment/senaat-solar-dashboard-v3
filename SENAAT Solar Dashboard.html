<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Inter','ui-sans-serif','system-ui','sans-serif'] },
        colors: {
          navy:    { 900: '#0B2545', 800: '#13315C', 700: '#1B4378', 600: '#2A5A9A' },
          gold:    { DEFAULT: '#B8860B', 600: '#A0750A', 400: '#D4A52A' },
          ind:     { red: '#C8102E' },
          ink:     { 900: '#0F172A', 700: '#475569', 500: '#94A3B8', 200: '#E2E8F0', 100: '#F1F5F9', 50: '#F8FAFC' },
          ok:      '#16A34A',
          warn:    '#EAB308',
          danger:  '#DC2626',
          info:    '#0284C7',
        },
        boxShadow: {
          card: '0 1px 0 rgba(15,23,42,0.04), 0 1px 3px rgba(15,23,42,0.06)',
          pop:  '0 8px 24px rgba(15,23,42,0.12), 0 2px 6px rgba(15,23,42,0.06)',
        }
      }
    }
  }
</script>
<style>
  html, body { background: #F8FAFC; color: #0F172A; font-family: 'Inter', system-ui, sans-serif; }
  .num, .tnum, table td, table th { font-variant-numeric: tabular-nums; }
  .scrollbar-thin::-webkit-scrollbar { height: 8px; width: 8px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 8px; }
  .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
  .accent-gold     { --accent: #B8860B; --accent-600: #A0750A; --accent-400: #D4A52A; }
  .accent-steel    { --accent: #2A5A9A; --accent-600: #1B4378; --accent-400: #4A7BC4; }
  .accent-red      { --accent: #C8102E; --accent-600: #A50C25; --accent-400: #E64A65; }
  .text-accent     { color: var(--accent); }
  .bg-accent       { background: var(--accent); }
  .bg-accent-soft  { background: color-mix(in srgb, var(--accent) 12%, white); }
  .border-accent   { border-color: var(--accent); }
  .ring-accent     { --tw-ring-color: var(--accent); }
  .dark-mode { background: #061528; color: #E2E8F0; }
  .dark-mode .surface { background: #0B2545; border-color: #13315C; color: #E2E8F0; }
  .dark-mode .surface-2 { background: #13315C; border-color: #1B4378; color: #E2E8F0; }
  .dark-mode .ink-on-dark { color: #E2E8F0; }
  .dark-mode .ink-muted-on-dark { color: #94A3B8; }
  .dark-mode .border-soft { border-color: #1B4378; }
  .dark-mode .hover-row:hover { background: #13315C; }
  .surface { background: #fff; border-color: #E2E8F0; color: #0F172A; }
  .surface-2 { background: #F8FAFC; border-color: #E2E8F0; color: #0F172A; }
  .border-soft { border-color: #E2E8F0; }
  .hover-row:hover { background: #F8FAFC; }
  /* checkered placeholder for map etc */
  .placeholder-grid {
    background-image:
      linear-gradient(45deg, rgba(15,23,42,0.04) 25%, transparent 25%),
      linear-gradient(-45deg, rgba(15,23,42,0.04) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, rgba(15,23,42,0.04) 75%),
      linear-gradient(-45deg, transparent 75%, rgba(15,23,42,0.04) 75%);
    background-size: 16px 16px;
    background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
  }
  .stage-pill { transition: all .15s ease; }
  .stage-pill:hover { transform: translateY(-1px); }
  .slide-over-enter { animation: slideIn .22s ease-out; }
  @keyframes slideIn { from { transform: translateX(24px); opacity: 0; } to { transform: none; opacity: 1; } }
</style>
